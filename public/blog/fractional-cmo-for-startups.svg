<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0d0b"/>
      <stop offset="100%" style="stop-color:#111110"/>
    </linearGradient>

    <!-- Trunk gradient — dim at bottom, bright at top -->
    <linearGradient id="trunkGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6a4e18;stop-opacity:0.5"/>
      <stop offset="40%" style="stop-color:#c8923a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e8b84c;stop-opacity:1"/>
    </linearGradient>

    <!-- Branch gradients -->
    <linearGradient id="branchL1" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c8923a;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#e8b84c;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="branchR1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8923a;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#e8b84c;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="branchL2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d9a040;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e8b84c;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="branchR2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d9a040;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e8b84c;stop-opacity:0.2"/>
    </linearGradient>

    <!-- Root glow -->
    <radialGradient id="rootGlow" cx="50%" cy="100%" r="30%">
      <stop offset="0%" style="stop-color:#c8923a;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#c8923a;stop-opacity:0"/>
    </radialGradient>

    <!-- Crown glow -->
    <radialGradient id="crownGlow" cx="50%" cy="20%" r="35%">
      <stop offset="0%" style="stop-color:#e8b84c;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#e8b84c;stop-opacity:0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="38" height="38" patternUnits="userSpaceOnUse">
    <circle cx="19" cy="19" r="0.7" fill="#e8b84c" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Root glow at base -->
  <ellipse cx="600" cy="580" rx="300" ry="80" fill="url(#rootGlow)"/>

  <!-- Crown glow at top -->
  <ellipse cx="600" cy="120" rx="280" ry="120" fill="url(#crownGlow)"/>

  <!-- ===== ROOTS — organic spreading curves from seed point ===== -->
  <!-- Seed point: 600, 545 -->
  <path d="M 600 545 Q 560 555 530 568 Q 500 578 475 572" stroke="#4a3810" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 600 545 Q 570 560 555 578 Q 540 590 520 588" stroke="#4a3810" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 600 545 Q 620 558 640 572 Q 660 582 685 578" stroke="#4a3810" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 600 545 Q 625 562 642 580 Q 658 594 678 592" stroke="#4a3810" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M 600 545 Q 590 565 585 582 Q 580 595 570 600" stroke="#4a3810" stroke-width="1" fill="none" opacity="0.35"/>
  <path d="M 600 545 Q 608 565 612 582 Q 616 596 628 602" stroke="#4a3810" stroke-width="1" fill="none" opacity="0.35"/>
  <!-- Faint outer roots -->
  <path d="M 530 568 Q 510 560 495 548 Q 480 536 462 540" stroke="#3a2c0c" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M 685 578 Q 705 568 720 556 Q 736 544 754 548" stroke="#3a2c0c" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- ===== MAIN TRUNK — central vertical spine, organic at bottom, straight at top ===== -->
  <!-- Organic lower section (slight S-curve) -->
  <path d="M 600 545 C 598 520 603 490 600 460 C 597 430 602 400 600 370"
        stroke="url(#trunkGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Straighter upper section -->
  <line x1="600" y1="370" x2="600" y2="160" stroke="#e8b84c" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
  <!-- Bright spine glow overlay -->
  <line x1="600" y1="370" x2="600" y2="160" stroke="#e8b84c" stroke-width="1" opacity="0.5" filter="url(#softglow)"/>

  <!-- ===== BRANCHES — organic lower, geometric upper ===== -->

  <!-- TIER 1 BRANCHES — organic, low, dimmer (~y=460) -->
  <!-- Left branch 1 -->
  <path d="M 600 460 Q 575 448 552 442 Q 528 436 510 430" stroke="#7a5820" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 510 430 Q 490 422 475 418" stroke="#5a4018" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Right branch 1 -->
  <path d="M 600 460 Q 625 448 648 442 Q 672 436 690 430" stroke="#7a5820" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round"/>
  <path d="M 690 430 Q 710 422 725 418" stroke="#5a4018" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Sub-branches tier 1 -->
  <path d="M 552 442 Q 540 430 532 422 Q 524 414 518 408" stroke="#5a4018" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 648 442 Q 660 430 668 422 Q 676 414 682 408" stroke="#5a4018" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- TIER 2 BRANCHES — semi-organic (~y=380) -->
  <!-- Left branch 2 -->
  <path d="M 600 380 C 578 370 558 362 535 356 C 515 350 495 348 478 344" stroke="#9a6e28" stroke-width="2" fill="none" opacity="0.65" stroke-linecap="round"/>
  <path d="M 478 344 C 462 340 450 338 436 336" stroke="#7a5820" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Right branch 2 -->
  <path d="M 600 380 C 622 370 642 362 665 356 C 685 350 705 348 722 344" stroke="#9a6e28" stroke-width="2" fill="none" opacity="0.65" stroke-linecap="round"/>
  <path d="M 722 344 C 738 340 750 338 764 336" stroke="#7a5820" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Sub-branches tier 2 -->
  <line x1="535" y1="356" x2="520" y2="338" stroke="#6a4e18" stroke-width="1" opacity="0.35"/>
  <line x1="535" y1="356" x2="516" y2="360" stroke="#6a4e18" stroke-width="0.8" opacity="0.25"/>
  <line x1="665" y1="356" x2="680" y2="338" stroke="#6a4e18" stroke-width="1" opacity="0.35"/>
  <line x1="665" y1="356" x2="684" y2="360" stroke="#6a4e18" stroke-width="0.8" opacity="0.25"/>

  <!-- TIER 3 BRANCHES — more geometric (~y=290) -->
  <!-- Left branch 3 — straight with angular junction -->
  <line x1="600" y1="290" x2="548" y2="272" stroke="#b88030" stroke-width="2" opacity="0.75"/>
  <line x1="548" y1="272" x2="500" y2="260" stroke="#b88030" stroke-width="1.5" opacity="0.6"/>
  <line x1="500" y1="260" x2="458" y2="252" stroke="#9a6e28" stroke-width="1.2" opacity="0.45"/>
  <!-- Left branch 3 sub -->
  <line x1="548" y1="272" x2="540" y2="248" stroke="#7a5820" stroke-width="1" opacity="0.35"/>
  <line x1="500" y1="260" x2="492" y2="236" stroke="#7a5820" stroke-width="0.8" opacity="0.3"/>

  <!-- Right branch 3 -->
  <line x1="600" y1="290" x2="652" y2="272" stroke="#b88030" stroke-width="2" opacity="0.75"/>
  <line x1="652" y1="272" x2="700" y2="260" stroke="#b88030" stroke-width="1.5" opacity="0.6"/>
  <line x1="700" y1="260" x2="742" y2="252" stroke="#9a6e28" stroke-width="1.2" opacity="0.45"/>
  <!-- Right branch 3 sub -->
  <line x1="652" y1="272" x2="660" y2="248" stroke="#7a5820" stroke-width="1" opacity="0.35"/>
  <line x1="700" y1="260" x2="708" y2="236" stroke="#7a5820" stroke-width="0.8" opacity="0.3"/>

  <!-- TIER 4 BRANCHES — fully geometric (~y=215) -->
  <!-- Left branch 4 — clean 45° lines -->
  <line x1="600" y1="215" x2="554" y2="196" stroke="#d9a040" stroke-width="2" opacity="0.8"/>
  <line x1="554" y1="196" x2="508" y2="182" stroke="#d9a040" stroke-width="1.5" opacity="0.65"/>
  <line x1="508" y1="182" x2="466" y2="172" stroke="#c8923a" stroke-width="1.2" opacity="0.5"/>
  <!-- Left branch 4 terminals -->
  <line x1="554" y1="196" x2="546" y2="174" stroke="#c8923a" stroke-width="0.8" opacity="0.4"/>
  <line x1="508" y1="182" x2="500" y2="160" stroke="#c8923a" stroke-width="0.8" opacity="0.35"/>

  <!-- Right branch 4 -->
  <line x1="600" y1="215" x2="646" y2="196" stroke="#d9a040" stroke-width="2" opacity="0.8"/>
  <line x1="646" y1="196" x2="692" y2="182" stroke="#d9a040" stroke-width="1.5" opacity="0.65"/>
  <line x1="692" y1="182" x2="734" y2="172" stroke="#c8923a" stroke-width="1.2" opacity="0.5"/>
  <!-- Right branch 4 terminals -->
  <line x1="646" y1="196" x2="654" y2="174" stroke="#c8923a" stroke-width="0.8" opacity="0.4"/>
  <line x1="692" y1="182" x2="700" y2="160" stroke="#c8923a" stroke-width="0.8" opacity="0.35"/>

  <!-- ===== CROWN STRUCTURE — geometric diamond grid at top ===== -->
  <!-- Diamond/grid formation around apex ~y=160 -->
  <!-- Central diamond -->
  <polygon points="600,128 630,160 600,192 570,160" fill="none" stroke="#e8b84c" stroke-width="1.5" opacity="0.7"/>
  <!-- Outer ring — 4 connected diamonds -->
  <polygon points="600,96 638,128 600,160 562,128" fill="none" stroke="#e8b84c" stroke-width="1" opacity="0.4"/>
  <!-- Horizontal bar through crown -->
  <line x1="528" y1="160" x2="672" y2="160" stroke="#e8b84c" stroke-width="0.8" opacity="0.3"/>
  <!-- Vertical bar through crown -->
  <line x1="600" y1="96" x2="600" y2="224" stroke="#e8b84c" stroke-width="0.8" opacity="0.3"/>

  <!-- Crown nodes -->
  <circle cx="600" cy="128" r="5" fill="#e8b84c" opacity="0.9" filter="url(#glow)"/>
  <circle cx="600" cy="128" r="2.5" fill="#0d0d0b"/>
  <circle cx="630" cy="160" r="3.5" fill="#e8b84c" opacity="0.7"/>
  <circle cx="570" cy="160" r="3.5" fill="#e8b84c" opacity="0.7"/>
  <circle cx="600" cy="192" r="3.5" fill="#e8b84c" opacity="0.6"/>

  <!-- Apex glow -->
  <circle cx="600" cy="128" r="16" fill="#e8b84c" opacity="0.06" filter="url(#bloom)"/>

  <!-- ===== BRANCH JUNCTION NODES ===== -->
  <circle cx="600" cy="460" r="3" fill="#7a5820" opacity="0.6"/>
  <circle cx="600" cy="380" r="3.5" fill="#9a6e28" opacity="0.7"/>
  <circle cx="600" cy="290" r="4" fill="#b88030" opacity="0.8"/>
  <circle cx="600" cy="215" r="4" fill="#d9a040" opacity="0.85"/>
  <circle cx="600" cy="160" r="5" fill="#e8b84c" opacity="0.9" filter="url(#glow)"/>

  <!-- Seed node at base -->
  <circle cx="600" cy="545" r="6" fill="#c8923a" opacity="0.7" filter="url(#softglow)"/>
  <circle cx="600" cy="545" r="3" fill="#0d0d0b"/>

  <!-- ===== SIDE DECORATIVE STRUCTURE — geometric grid fragments on outer edges ===== -->
  <!-- Left side minimal grid suggestion -->
  <line x1="80" y1="200" x2="140" y2="200" stroke="#e8b84c" stroke-width="0.5" opacity="0.12"/>
  <line x1="80" y1="240" x2="140" y2="240" stroke="#e8b84c" stroke-width="0.5" opacity="0.10"/>
  <line x1="80" y1="280" x2="140" y2="280" stroke="#e8b84c" stroke-width="0.5" opacity="0.08"/>
  <line x1="80" y1="200" x2="80" y2="280" stroke="#e8b84c" stroke-width="0.5" opacity="0.10"/>
  <line x1="140" y1="200" x2="140" y2="280" stroke="#e8b84c" stroke-width="0.5" opacity="0.10"/>

  <!-- Right side minimal grid -->
  <line x1="1060" y1="200" x2="1120" y2="200" stroke="#e8b84c" stroke-width="0.5" opacity="0.12"/>
  <line x1="1060" y1="240" x2="1120" y2="240" stroke="#e8b84c" stroke-width="0.5" opacity="0.10"/>
  <line x1="1060" y1="280" x2="1120" y2="280" stroke="#e8b84c" stroke-width="0.5" opacity="0.08"/>
  <line x1="1060" y1="200" x2="1060" y2="280" stroke="#e8b84c" stroke-width="0.5" opacity="0.10"/>
  <line x1="1120" y1="200" x2="1120" y2="280" stroke="#e8b84c" stroke-width="0.5" opacity="0.10"/>

  <!-- Corner marks -->
  <line x1="48" y1="50" x2="100" y2="50" stroke="#e8b84c" stroke-width="0.6" opacity="0.18"/>
  <line x1="48" y1="50" x2="48" y2="102" stroke="#e8b84c" stroke-width="0.6" opacity="0.18"/>
  <line x1="1152" y1="50" x2="1100" y2="50" stroke="#e8b84c" stroke-width="0.6" opacity="0.18"/>
  <line x1="1152" y1="50" x2="1152" y2="102" stroke="#e8b84c" stroke-width="0.6" opacity="0.18"/>
  <line x1="48" y1="580" x2="100" y2="580" stroke="#e8b84c" stroke-width="0.6" opacity="0.14"/>
  <line x1="48" y1="580" x2="48" y2="528" stroke="#e8b84c" stroke-width="0.6" opacity="0.14"/>
  <line x1="1152" y1="580" x2="1100" y2="580" stroke="#e8b84c" stroke-width="0.6" opacity="0.14"/>
  <line x1="1152" y1="580" x2="1152" y2="528" stroke="#e8b84c" stroke-width="0.6" opacity="0.14"/>
</svg>
