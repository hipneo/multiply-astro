<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- ── OUTER ORBIT RINGS ─────────────────────────────────────────────── -->
  <circle cx="600" cy="315" r="280" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.08" stroke-dasharray="3 6"/>
  <circle cx="600" cy="315" r="200" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.12"/>
  <circle cx="600" cy="315" r="120" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.18"/>

  <!-- ── 12 SPOKES from hub to outer orbit nodes ───────────────────────── -->
  <!-- Angles: 12 evenly distributed every 30° -->
  <!-- Position formula: x = 600 + r*cos(angle), y = 315 + r*sin(angle), where angle starts at -90° (top) -->
  <!-- Node positions at r=200: -->
  <!-- 0° (top): 600, 115 -->
  <!-- 30°: 700, 142 (cos=0.5, sin=-0.866 from top) -->
  <!-- Actually, let me use the convention angle_from_top: -->
  <!-- 0° top: (600, 115); 30°: (700, 142.13); 60°: (773.21, 215); 90° right: (800, 315); 120°: (773.21, 415); 150°: (700, 487.87); 180° bottom: (600, 515); 210°: (500, 487.87); 240°: (426.79, 415); 270° left: (400, 315); 300°: (426.79, 215); 330°: (500, 142.13) -->

  <g stroke="#1C1C1A" stroke-width="1" opacity="0.18" fill="none">
    <line x1="600" y1="315" x2="600" y2="115"/>
    <line x1="600" y1="315" x2="700" y2="142"/>
    <line x1="600" y1="315" x2="773" y2="215"/>
    <line x1="600" y1="315" x2="800" y2="315"/>
    <line x1="600" y1="315" x2="773" y2="415"/>
    <line x1="600" y1="315" x2="700" y2="488"/>
    <line x1="600" y1="315" x2="600" y2="515"/>
    <line x1="600" y1="315" x2="500" y2="488"/>
    <line x1="600" y1="315" x2="427" y2="415"/>
    <line x1="600" y1="315" x2="400" y2="315"/>
    <line x1="600" y1="315" x2="427" y2="215"/>
    <line x1="600" y1="315" x2="500" y2="142"/>
  </g>

  <!-- ── HIGHLIGHTED CRIMSON SPOKE (focal axis) ──────────────────────────── -->
  <line x1="600" y1="315" x2="773" y2="215" stroke="#9B2335" stroke-width="1.5" opacity="0.55"/>

  <!-- ── INNER LEDGER RING (small ticks at r=120) ──────────────────────── -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.22">
    <line x1="600" y1="195" x2="600" y2="203"/>
    <line x1="660" y1="205" x2="664" y2="213"/>
    <line x1="704" y1="249" x2="712" y2="253"/>
    <line x1="720" y1="315" x2="712" y2="315"/>
    <line x1="704" y1="381" x2="712" y2="377"/>
    <line x1="660" y1="425" x2="664" y2="417"/>
    <line x1="600" y1="435" x2="600" y2="427"/>
    <line x1="540" y1="425" x2="536" y2="417"/>
    <line x1="496" y1="381" x2="488" y2="377"/>
    <line x1="480" y1="315" x2="488" y2="315"/>
    <line x1="496" y1="249" x2="488" y2="253"/>
    <line x1="540" y1="205" x2="536" y2="213"/>
  </g>

  <!-- ── OUTER NODES (12 facets of the role) ───────────────────────────── -->
  <!-- Default node style: light fill, dark thin stroke -->
  <g>
    <circle cx="600" cy="115" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="700" cy="142" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <!-- focal node (crimson, larger, with halo) -->
    <circle cx="773" cy="215" r="22" fill="none" stroke="#9B2335" stroke-width="1" opacity="0.3"/>
    <circle cx="773" cy="215" r="13" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5" opacity="0.95"/>
    <circle cx="773" cy="215" r="6" fill="#9B2335"/>
    <circle cx="800" cy="315" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="773" cy="415" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="700" cy="488" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="600" cy="515" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="500" cy="488" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="427" cy="415" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="400" cy="315" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="427" cy="215" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
    <circle cx="500" cy="142" r="11" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.78"/>
  </g>

  <!-- ── CONNECTIONS BETWEEN OUTER NODES (subtle lattice) ──────────────── -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.08" fill="none">
    <line x1="600" y1="115" x2="700" y2="142"/>
    <line x1="700" y1="142" x2="773" y2="215"/>
    <line x1="773" y1="215" x2="800" y2="315"/>
    <line x1="800" y1="315" x2="773" y2="415"/>
    <line x1="773" y1="415" x2="700" y2="488"/>
    <line x1="700" y1="488" x2="600" y2="515"/>
    <line x1="600" y1="515" x2="500" y2="488"/>
    <line x1="500" y1="488" x2="427" y2="415"/>
    <line x1="427" y1="415" x2="400" y2="315"/>
    <line x1="400" y1="315" x2="427" y2="215"/>
    <line x1="427" y1="215" x2="500" y2="142"/>
    <line x1="500" y1="142" x2="600" y2="115"/>
  </g>

  <!-- ── CENTRAL HUB ───────────────────────────────────────────────────── -->
  <!-- Soft halo -->
  <circle cx="600" cy="315" r="58" fill="#9B2335" opacity="0.06"/>
  <circle cx="600" cy="315" r="42" fill="#9B2335" opacity="0.10"/>
  <!-- Main hub -->
  <circle cx="600" cy="315" r="28" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.75" opacity="0.95"/>
  <circle cx="600" cy="315" r="11" fill="#9B2335"/>

  <!-- Selection brackets around hub -->
  <polyline points="566,275 558,275 558,283" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="634,275 642,275 642,283" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="566,355 558,355 558,347" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="634,355 642,355 642,347" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── CORNER GEOMETRY ────────────────────────────────────────────────── -->
  <!-- Top-left -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <!-- Top-right ledger (legend stack) -->
  <g>
    <line x1="1020" y1="58" x2="1148" y2="58" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="74" x2="1130" y2="74" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="1020" y1="90" x2="1148" y2="90" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="106" x2="1110" y2="106" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="1020" y1="122" x2="1130" y2="122" stroke="#9B2335" stroke-width="1" opacity="0.45"/>
    <circle cx="1012" cy="122" r="3" fill="#9B2335" opacity="0.6"/>
  </g>

  <!-- Bottom-left tier ladder -->
  <g stroke="#1C1C1A" stroke-width="0.75">
    <line x1="56" y1="540" x2="156" y2="540" opacity="0.16"/>
    <line x1="56" y1="556" x2="136" y2="556" opacity="0.12"/>
    <line x1="56" y1="572" x2="116" y2="572" opacity="0.10"/>
  </g>

  <!-- Bottom-right small target -->
  <circle cx="1130" cy="570" r="14" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1130" cy="570" r="7" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4"/>
  <circle cx="1130" cy="570" r="2" fill="#9B2335" opacity="0.65"/>

  <!-- Faint axis marks at cardinal points outside outer ring -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.18">
    <line x1="600" y1="22" x2="600" y2="32"/>
    <line x1="600" y1="598" x2="600" y2="608"/>
    <line x1="296" y1="315" x2="306" y2="315"/>
    <line x1="894" y1="315" x2="904" y2="315"/>
  </g>
</svg>
