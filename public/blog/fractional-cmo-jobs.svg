<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- ── DIVIDER between PUBLIC (job board) and HIDDEN (network) ────────── -->
  <line x1="600" y1="100" x2="600" y2="530" stroke="#1C1C1A" stroke-width="1" opacity="0.3" stroke-dasharray="5 7"/>
  <line x1="588" y1="100" x2="612" y2="100" stroke="#1C1C1A" stroke-width="0.75" opacity="0.3"/>
  <line x1="588" y1="530" x2="612" y2="530" stroke="#1C1C1A" stroke-width="0.75" opacity="0.3"/>

  <!-- ── LEFT: empty job board (visible, sparse) ────────────────────────── -->
  <rect x="80" y="130" width="470" height="370" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.25" rx="3" stroke-dasharray="3 5"/>

  <!-- Job board interior — mostly empty, a couple of skeleton "listings" -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.16">
    <!-- Header row -->
    <line x1="110" y1="170" x2="520" y2="170"/>
    <line x1="110" y1="180" x2="350" y2="180"/>

    <!-- Listing 1 skeleton -->
    <line x1="110" y1="220" x2="520" y2="220"/>
    <line x1="110" y1="235" x2="450" y2="235"/>
    <line x1="110" y1="248" x2="300" y2="248"/>

    <!-- Listing 2 skeleton -->
    <line x1="110" y1="290" x2="520" y2="290"/>
    <line x1="110" y1="305" x2="430" y2="305"/>
    <line x1="110" y1="318" x2="290" y2="318"/>

    <!-- Mostly empty space below — only faint guidelines -->
    <line x1="110" y1="370" x2="520" y2="370" stroke-dasharray="3 6"/>
    <line x1="110" y1="395" x2="520" y2="395" stroke-dasharray="3 6"/>
    <line x1="110" y1="420" x2="520" y2="420" stroke-dasharray="3 6"/>
    <line x1="110" y1="445" x2="520" y2="445" stroke-dasharray="3 6"/>
    <line x1="110" y1="470" x2="520" y2="470" stroke-dasharray="3 6"/>
  </g>

  <!-- Search magnifier (small icon top-left of panel) -->
  <g stroke="#1C1C1A" stroke-width="1" opacity="0.35" fill="none">
    <circle cx="118" cy="155" r="6"/>
    <line x1="123" y1="160" x2="129" y2="166"/>
  </g>

  <!-- "No results" marker — a faint X at center -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.18">
    <line x1="290" y1="395" x2="320" y2="425"/>
    <line x1="320" y1="395" x2="290" y2="425"/>
  </g>

  <!-- Header strip for left panel -->
  <line x1="80" y1="160" x2="180" y2="160" stroke="#1C1C1A" stroke-width="1.5" opacity="0.4"/>
  <line x1="190" y1="160" x2="220" y2="160" stroke="#1C1C1A" stroke-width="1.5" opacity="0.25"/>

  <!-- ── RIGHT: HIDDEN NETWORK (the actual market) ──────────────────────── -->
  <rect x="650" y="130" width="470" height="370" fill="none" stroke="#9B2335" stroke-width="1.5" opacity="0.45" rx="3"/>

  <!-- Dense lattice of connection lines -->
  <g stroke="#9B2335" stroke-width="0.5" opacity="0.22" fill="none">
    <!-- inner connections — heavy interweaving -->
    <line x1="730" y1="210" x2="830" y2="190"/>
    <line x1="830" y1="190" x2="920" y2="220"/>
    <line x1="920" y1="220" x2="1010" y2="200"/>
    <line x1="1010" y1="200" x2="1070" y2="250"/>

    <line x1="730" y1="210" x2="800" y2="290"/>
    <line x1="800" y1="290" x2="900" y2="280"/>
    <line x1="900" y1="280" x2="985" y2="320"/>
    <line x1="985" y1="320" x2="1070" y2="250"/>

    <line x1="830" y1="190" x2="900" y2="280"/>
    <line x1="920" y1="220" x2="985" y2="320"/>
    <line x1="800" y1="290" x2="730" y2="380"/>
    <line x1="730" y1="380" x2="830" y2="410"/>
    <line x1="830" y1="410" x2="900" y2="280"/>
    <line x1="830" y1="410" x2="940" y2="430"/>
    <line x1="940" y1="430" x2="985" y2="320"/>
    <line x1="940" y1="430" x2="1050" y2="400"/>
    <line x1="1050" y1="400" x2="985" y2="320"/>
    <line x1="1050" y1="400" x2="1070" y2="250"/>
    <line x1="900" y1="280" x2="940" y2="430"/>
    <line x1="730" y1="380" x2="800" y2="290"/>
    <line x1="900" y1="280" x2="830" y2="410"/>
  </g>

  <!-- Network nodes — people in the hidden market -->
  <g>
    <!-- Focal central node (the listener / referral source — crimson, halo) -->
    <circle cx="900" cy="280" r="44" fill="#9B2335" opacity="0.07"/>
    <circle cx="900" cy="280" r="28" fill="#9B2335" opacity="0.12"/>
    <circle cx="900" cy="280" r="16" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5" opacity="0.95"/>
    <circle cx="900" cy="280" r="6" fill="#9B2335"/>

    <!-- Selection brackets around focal -->
    <polyline points="880,256 872,256 872,264" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="920,256 928,256 928,264" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="880,304 872,304 872,296" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="920,304 928,304 928,296" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Other nodes — different sizes, varying opacity -->
    <circle cx="730" cy="210" r="9" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="730" cy="210" r="4" fill="#9B2335" opacity="0.6"/>

    <circle cx="830" cy="190" r="10" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="830" cy="190" r="4" fill="#9B2335" opacity="0.6"/>

    <circle cx="920" cy="220" r="8" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.75"/>
    <circle cx="920" cy="220" r="3" fill="#9B2335" opacity="0.5"/>

    <circle cx="1010" cy="200" r="9" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.8"/>
    <circle cx="1010" cy="200" r="4" fill="#9B2335" opacity="0.55"/>

    <circle cx="1070" cy="250" r="10" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="1070" cy="250" r="4" fill="#9B2335" opacity="0.6"/>

    <circle cx="800" cy="290" r="8" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.75"/>
    <circle cx="800" cy="290" r="3" fill="#9B2335" opacity="0.5"/>

    <circle cx="985" cy="320" r="10" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="985" cy="320" r="4" fill="#9B2335" opacity="0.6"/>

    <circle cx="730" cy="380" r="9" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.75"/>
    <circle cx="730" cy="380" r="3" fill="#9B2335" opacity="0.5"/>

    <circle cx="830" cy="410" r="10" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="830" cy="410" r="4" fill="#9B2335" opacity="0.6"/>

    <circle cx="940" cy="430" r="9" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.8"/>
    <circle cx="940" cy="430" r="3" fill="#9B2335" opacity="0.55"/>

    <circle cx="1050" cy="400" r="8" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.75"/>
    <circle cx="1050" cy="400" r="3" fill="#9B2335" opacity="0.5"/>
  </g>

  <!-- Header strip for right panel -->
  <line x1="650" y1="160" x2="730" y2="160" stroke="#9B2335" stroke-width="2" opacity="0.6"/>
  <line x1="740" y1="160" x2="770" y2="160" stroke="#9B2335" stroke-width="2" opacity="0.35"/>

  <!-- Three-message hint: three small concentric arcs near focal, suggesting referral signal -->
  <g fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4">
    <path d="M 950 245 A 60 60 0 0 1 950 315"/>
    <path d="M 965 230 A 80 80 0 0 1 965 330"/>
  </g>

  <!-- ── CORNER GEOMETRY ────────────────────────────────────────────────── -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <g>
    <line x1="1020" y1="58" x2="1148" y2="58" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="74" x2="1130" y2="74" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="1020" y1="90" x2="1148" y2="90" stroke="#9B2335" stroke-width="1" opacity="0.45"/>
    <circle cx="1012" cy="90" r="3" fill="#9B2335" opacity="0.6"/>
  </g>

  <g stroke="#1C1C1A" stroke-width="0.75">
    <line x1="56" y1="558" x2="156" y2="558" opacity="0.16"/>
    <line x1="56" y1="572" x2="136" y2="572" opacity="0.12"/>
    <line x1="56" y1="586" x2="116" y2="586" opacity="0.10"/>
  </g>

  <circle cx="1130" cy="570" r="14" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1130" cy="570" r="7" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4"/>
  <circle cx="1130" cy="570" r="2" fill="#9B2335" opacity="0.65"/>
</svg>
