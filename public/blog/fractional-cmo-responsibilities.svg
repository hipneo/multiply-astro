<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint cross-axis grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- ── DIVISION LINE between OWNS and DIRECTS ──────────────────────────── -->
  <line x1="600" y1="90" x2="600" y2="540" stroke="#1C1C1A" stroke-width="1" opacity="0.3" stroke-dasharray="6 8"/>

  <!-- Small tick marks at each end of the divider -->
  <line x1="588" y1="90" x2="612" y2="90" stroke="#1C1C1A" stroke-width="0.75" opacity="0.3"/>
  <line x1="588" y1="540" x2="612" y2="540" stroke="#1C1C1A" stroke-width="0.75" opacity="0.3"/>

  <!-- ── LEFT SIDE: OWNS (crimson, primary territory) ───────────────────── -->
  <!-- Container -->
  <rect x="100" y="120" width="450" height="390" fill="none" stroke="#9B2335" stroke-width="1.5" opacity="0.45" rx="4"/>

  <!-- Dense interior node lattice for OWNS -->
  <g stroke="#9B2335" stroke-width="0.5" opacity="0.18" fill="none">
    <line x1="180" y1="200" x2="280" y2="200"/>
    <line x1="180" y1="200" x2="180" y2="300"/>
    <line x1="280" y1="200" x2="380" y2="280"/>
    <line x1="180" y1="300" x2="280" y2="380"/>
    <line x1="280" y1="380" x2="380" y2="280"/>
    <line x1="380" y1="280" x2="470" y2="350"/>
    <line x1="280" y1="380" x2="380" y2="430"/>
    <line x1="380" y1="430" x2="470" y2="350"/>
    <line x1="180" y1="300" x2="280" y2="200"/>
    <line x1="280" y1="380" x2="180" y2="300"/>
  </g>

  <!-- OWNS — central crimson hub -->
  <circle cx="325" cy="315" r="56" fill="#9B2335" opacity="0.08"/>
  <circle cx="325" cy="315" r="42" fill="#9B2335" opacity="0.13"/>
  <circle cx="325" cy="315" r="28" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.75" opacity="0.95"/>
  <circle cx="325" cy="315" r="11" fill="#9B2335"/>

  <!-- Selection brackets around hub -->
  <polyline points="289,279 281,279 281,287" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="361,279 369,279 369,287" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="289,351 281,351 281,343" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="361,351 369,351 369,343" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Satellite category nodes around OWNS hub (4 ownership categories) -->
  <g>
    <!-- Strategy -->
    <circle cx="180" cy="200" r="11" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="180" cy="200" r="5" fill="#9B2335" opacity="0.65"/>
    <!-- Team -->
    <circle cx="470" cy="200" r="11" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="470" cy="200" r="5" fill="#9B2335" opacity="0.65"/>
    <!-- Channels -->
    <circle cx="180" cy="430" r="11" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="180" cy="430" r="5" fill="#9B2335" opacity="0.65"/>
    <!-- Reporting -->
    <circle cx="470" cy="430" r="11" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.25" opacity="0.85"/>
    <circle cx="470" cy="430" r="5" fill="#9B2335" opacity="0.65"/>
  </g>

  <!-- Connection spokes from hub to category nodes (solid) -->
  <g stroke="#9B2335" stroke-width="1" opacity="0.45" fill="none">
    <line x1="325" y1="315" x2="180" y2="200"/>
    <line x1="325" y1="315" x2="470" y2="200"/>
    <line x1="325" y1="315" x2="180" y2="430"/>
    <line x1="325" y1="315" x2="470" y2="430"/>
  </g>

  <!-- Header strip for OWNS panel -->
  <line x1="100" y1="150" x2="200" y2="150" stroke="#9B2335" stroke-width="2" opacity="0.65"/>
  <line x1="210" y1="150" x2="240" y2="150" stroke="#9B2335" stroke-width="2" opacity="0.4"/>

  <!-- ── RIGHT SIDE: DIRECTS / NOT OWNED (dark ink, secondary territory) ─ -->
  <!-- Container -->
  <rect x="650" y="120" width="450" height="390" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.3" rx="4" stroke-dasharray="4 6"/>

  <!-- Dispersed nodes (the things the CMO does NOT own — execution scattered) -->
  <g>
    <!-- Cluster: smaller, lighter nodes scattered (representing execution work) -->
    <circle cx="730" cy="200" r="8" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="820" cy="180" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.45"/>
    <circle cx="900" cy="220" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="980" cy="180" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <circle cx="1050" cy="220" r="8" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.5"/>

    <circle cx="710" cy="290" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <circle cx="790" cy="320" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.6"/>
    <circle cx="870" cy="290" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.5"/>
    <circle cx="950" cy="330" r="8" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="1030" cy="300" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>

    <circle cx="740" cy="400" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.5"/>
    <circle cx="830" cy="430" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <circle cx="910" cy="410" r="8" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="990" cy="440" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <circle cx="1060" cy="410" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Faint connecting threads showing they're directed but not owned -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.12" fill="none" stroke-dasharray="2 4">
    <line x1="730" y1="200" x2="820" y2="180"/>
    <line x1="820" y1="180" x2="900" y2="220"/>
    <line x1="900" y1="220" x2="980" y2="180"/>
    <line x1="710" y1="290" x2="790" y2="320"/>
    <line x1="790" y1="320" x2="870" y2="290"/>
    <line x1="870" y1="290" x2="950" y2="330"/>
    <line x1="740" y1="400" x2="830" y2="430"/>
    <line x1="830" y1="430" x2="910" y2="410"/>
    <line x1="910" y1="410" x2="990" y2="440"/>
  </g>

  <!-- Direction arrow from OWNS hub into DIRECTS territory (the leadership flow) -->
  <path d="M 366 315 L 870 315"
    fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.25" stroke-dasharray="2 5"/>
  <!-- Arrow head -->
  <polyline points="860 309, 870 315, 860 321" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.4"/>

  <!-- Header strip for DIRECTS panel -->
  <line x1="650" y1="150" x2="730" y2="150" stroke="#1C1C1A" stroke-width="1.25" opacity="0.4"/>
  <line x1="740" y1="150" x2="770" y2="150" stroke="#1C1C1A" stroke-width="1.25" opacity="0.25"/>

  <!-- ── CORNER GEOMETRY ────────────────────────────────────────────────── -->
  <!-- Top-left -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <!-- Top-right ledger -->
  <g>
    <line x1="1020" y1="58" x2="1148" y2="58" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="74" x2="1130" y2="74" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="1020" y1="90" x2="1148" y2="90" stroke="#9B2335" stroke-width="1" opacity="0.45"/>
    <circle cx="1012" cy="90" r="3" fill="#9B2335" opacity="0.6"/>
  </g>

  <!-- Bottom-left tier ladder -->
  <g stroke="#1C1C1A" stroke-width="0.75">
    <line x1="56" y1="558" x2="156" y2="558" opacity="0.16"/>
    <line x1="56" y1="572" x2="136" y2="572" opacity="0.12"/>
    <line x1="56" y1="586" x2="116" y2="586" opacity="0.10"/>
  </g>

  <!-- Bottom-right small target -->
  <circle cx="1130" cy="570" r="14" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1130" cy="570" r="7" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4"/>
  <circle cx="1130" cy="570" r="2" fill="#9B2335" opacity="0.65"/>
</svg>
