<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="connFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9B2335" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9B2335" stop-opacity="0.95"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B2335" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9B2335" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint map graticule (lat/long grid) -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="330" x2="1200" y2="330"/>
    <line x1="0" y1="435" x2="1200" y2="435"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Curved graticule hints (suggesting a globe) -->
  <g stroke="#1C1C1A" stroke-width="0.5" fill="none" opacity="0.05">
    <path d="M 600 20 C 360 200, 360 430, 600 610"/>
    <path d="M 600 20 C 840 200, 840 430, 600 610"/>
    <path d="M 600 20 C 480 220, 480 410, 600 610"/>
    <path d="M 600 20 C 720 220, 720 410, 600 610"/>
  </g>

  <!-- Scattered "other" location pins (muted ink, the nearby noise) -->
  <g fill="#1C1C1A">
    <g opacity="0.16">
      <path d="M 250 300 C 250 290, 266 290, 266 300 C 266 309, 258 318, 258 318 C 258 318, 250 309, 250 300 Z"/>
      <circle cx="258" cy="300" r="3" fill="#F9F8F5"/>
    </g>
    <g opacity="0.16">
      <path d="M 360 200 C 360 191, 374 191, 374 200 C 374 208, 367 216, 367 216 C 367 216, 360 208, 360 200 Z"/>
      <circle cx="367" cy="200" r="2.6" fill="#F9F8F5"/>
    </g>
    <g opacity="0.16">
      <path d="M 320 430 C 320 421, 334 421, 334 430 C 334 438, 327 446, 327 446 C 327 446, 320 438, 320 430 Z"/>
      <circle cx="327" cy="430" r="2.6" fill="#F9F8F5"/>
    </g>
    <g opacity="0.16">
      <path d="M 470 360 C 470 351, 484 351, 484 360 C 484 368, 477 376, 477 376 C 477 376, 470 368, 470 360 Z"/>
      <circle cx="477" cy="360" r="2.6" fill="#F9F8F5"/>
    </g>
    <g opacity="0.16">
      <path d="M 200 410 C 200 401, 214 401, 214 410 C 214 418, 207 426, 207 426 C 207 426, 200 418, 200 410 Z"/>
      <circle cx="207" cy="410" r="2.6" fill="#F9F8F5"/>
    </g>
    <g opacity="0.16">
      <path d="M 700 470 C 700 461, 714 461, 714 470 C 714 478, 707 486, 707 486 C 707 486, 700 478, 700 470 Z"/>
      <circle cx="707" cy="470" r="2.6" fill="#F9F8F5"/>
    </g>
    <g opacity="0.16">
      <path d="M 820 180 C 820 171, 834 171, 834 180 C 834 188, 827 196, 827 196 C 827 196, 820 188, 820 180 Z"/>
      <circle cx="827" cy="180" r="2.6" fill="#F9F8F5"/>
    </g>
    <g opacity="0.16">
      <path d="M 980 420 C 980 411, 994 411, 994 420 C 994 428, 987 436, 987 436 C 987 436, 980 428, 980 420 Z"/>
      <circle cx="987" cy="420" r="2.6" fill="#F9F8F5"/>
    </g>
  </g>

  <!-- The two endpoints that matter: YOU (left) and the RIGHT hire (far right) -->

  <!-- The direct connection line across the distance -->
  <path d="M 250 470 C 520 360, 760 320, 1010 220" stroke="url(#connFade)" stroke-width="2.5" fill="none"/>

  <!-- Direction nodes along the line -->
  <circle cx="520" cy="360" r="2.5" fill="#9B2335" opacity="0.5"/>
  <circle cx="760" cy="320" r="2.5" fill="#9B2335" opacity="0.5"/>

  <!-- YOU pin (crimson, anchored lower-left) -->
  <circle cx="250" cy="470" r="46" fill="url(#pulse)"/>
  <path d="M 232 462 C 232 442, 268 442, 268 462 C 268 482, 250 504, 250 504 C 250 504, 232 482, 232 462 Z" fill="#9B2335"/>
  <circle cx="250" cy="462" r="8" fill="#F9F8F5"/>

  <!-- THE RIGHT HIRE pin (crimson, far upper-right, across the distance) -->
  <circle cx="1010" cy="220" r="52" fill="url(#pulse)"/>
  <path d="M 990 210 C 990 188, 1030 188, 1030 210 C 1030 232, 1010 256, 1010 256 C 1010 256, 990 232, 990 210 Z" fill="#9B2335"/>
  <circle cx="1010" cy="210" r="9" fill="#F9F8F5"/>
  <circle cx="1010" cy="210" r="4" fill="#9B2335"/>

  <!-- Corner accents to match house style -->
  <rect x="1108" y="44" width="48" height="48" fill="none" stroke="#9B2335" stroke-width="1" opacity="0.22" rx="1"/>
  <rect x="1120" y="56" width="24" height="24" fill="#9B2335" opacity="0.10"/>
  <rect x="44" y="558" width="34" height="26" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.10" rx="1"/>
</svg>
