<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Glow at left hub -->
    <radialGradient id="glowHub1" cx="22%" cy="60%" r="32%">
      <stop offset="0%" stop-color="#E8A84C" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#E8A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow at centre hub -->
    <radialGradient id="glowHub2" cx="52%" cy="40%" r="36%">
      <stop offset="0%" stop-color="#E8A84C" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#E8A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow at right hub -->
    <radialGradient id="glowHub3" cx="84%" cy="26%" r="28%">
      <stop offset="0%" stop-color="#E8A84C" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#E8A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── BASE ───────────────────────────────────────── -->
  <rect width="1200" height="630" fill="#0E0E0C"/>
  <rect width="1200" height="630" fill="url(#glowHub1)"/>
  <rect width="1200" height="630" fill="url(#glowHub2)"/>
  <rect width="1200" height="630" fill="url(#glowHub3)"/>

  <!-- ── FAINT CHART GRID ──────────────────────────── -->
  <g stroke="#E8A84C" stroke-width="0.5" opacity="0.04">
    <line x1="0"    y1="157" x2="1200" y2="157"/>
    <line x1="0"    y1="315" x2="1200" y2="315"/>
    <line x1="0"    y1="472" x2="1200" y2="472"/>
    <line x1="300"  y1="0"   x2="300"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="900"  y1="0"   x2="900"  y2="630"/>
  </g>

  <!-- ── HUB 1: LEFT — large process ring (260, 378) ── -->
  <!-- Outer rings — gear-like concentric circles -->
  <circle cx="260" cy="378" r="130" fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.1"/>
  <circle cx="260" cy="378" r="104" fill="none" stroke="#E8A84C" stroke-width="1"    opacity="0.15"/>
  <circle cx="260" cy="378" r="78"  fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.2"/>
  <circle cx="260" cy="378" r="52"  fill="none" stroke="#E8A84C" stroke-width="1"    opacity="0.25"/>
  <circle cx="260" cy="378" r="26"  fill="none" stroke="#E8A84C" stroke-width="1.25" opacity="0.3"/>
  <!-- Hub centre node -->
  <circle cx="260" cy="378" r="8"   fill="#E8A84C" opacity="0.85"/>
  <!-- Hub glow halo -->
  <circle cx="260" cy="378" r="36"  fill="#E8A84C" opacity="0.07"/>
  <!-- Diamond marker -->
  <rect x="246" y="364" width="28" height="28"
        transform="rotate(45 260 378)"
        fill="none" stroke="#E8A84C" stroke-width="1" opacity="0.35"/>
  <!-- Radial spokes from hub 1 (8 spokes) -->
  <g stroke="#E8A84C" stroke-width="0.75" opacity="0.14">
    <line x1="260" y1="252" x2="260" y2="248"/>
    <line x1="349" y1="289" x2="352" y2="286"/>
    <line x1="388" y1="378" x2="392" y2="378"/>
    <line x1="349" y1="467" x2="352" y2="470"/>
    <line x1="260" y1="506" x2="260" y2="510"/>
    <line x1="171" y1="467" x2="168" y2="470"/>
    <line x1="132" y1="378" x2="128" y2="378"/>
    <line x1="171" y1="289" x2="168" y2="286"/>
  </g>
  <!-- Tick marks around outer ring of hub 1 (at 45-deg intervals) -->
  <g stroke="#E8A84C" stroke-width="1" opacity="0.2" stroke-linecap="round">
    <line x1="260" y1="245" x2="260" y2="255"/>
    <line x1="352" y1="286" x2="345" y2="293"/>
    <line x1="391" y1="378" x2="381" y2="378"/>
    <line x1="352" y1="470" x2="345" y2="463"/>
    <line x1="260" y1="509" x2="260" y2="499"/>
    <line x1="168" y1="470" x2="175" y2="463"/>
    <line x1="129" y1="378" x2="139" y2="378"/>
    <line x1="168" y1="286" x2="175" y2="293"/>
  </g>

  <!-- ── HUB 2: CENTRE — medium process ring (620, 248) ── -->
  <circle cx="620" cy="248" r="108" fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.1"/>
  <circle cx="620" cy="248" r="84"  fill="none" stroke="#E8A84C" stroke-width="1"    opacity="0.15"/>
  <circle cx="620" cy="248" r="60"  fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.22"/>
  <circle cx="620" cy="248" r="36"  fill="none" stroke="#E8A84C" stroke-width="1"    opacity="0.28"/>
  <circle cx="620" cy="248" r="18"  fill="none" stroke="#E8A84C" stroke-width="1.25" opacity="0.32"/>
  <!-- Hub 2 centre node -->
  <circle cx="620" cy="248" r="10"  fill="#E8A84C" opacity="0.92"/>
  <!-- Glow halo -->
  <circle cx="620" cy="248" r="42"  fill="#E8A84C" opacity="0.09"/>
  <circle cx="620" cy="248" r="70"  fill="#E8A84C" opacity="0.04"/>
  <!-- Diamond marker -->
  <rect x="606" y="234" width="28" height="28"
        transform="rotate(45 620 248)"
        fill="none" stroke="#E8A84C" stroke-width="1.25" opacity="0.4"/>
  <!-- Radial tick marks around hub 2 outer ring -->
  <g stroke="#E8A84C" stroke-width="1" opacity="0.2" stroke-linecap="round">
    <line x1="620" y1="137" x2="620" y2="147"/>
    <line x1="697" y1="161" x2="690" y2="168"/>
    <line x1="724" y1="248" x2="714" y2="248"/>
    <line x1="697" y1="335" x2="690" y2="328"/>
    <line x1="620" y1="359" x2="620" y2="349"/>
    <line x1="543" y1="335" x2="550" y2="328"/>
    <line x1="516" y1="248" x2="526" y2="248"/>
    <line x1="543" y1="161" x2="550" y2="168"/>
  </g>

  <!-- ── HUB 3: RIGHT — smaller process ring (960, 162) ── -->
  <circle cx="960" cy="162" r="88"  fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.1"/>
  <circle cx="960" cy="162" r="66"  fill="none" stroke="#E8A84C" stroke-width="1"    opacity="0.16"/>
  <circle cx="960" cy="162" r="44"  fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.22"/>
  <circle cx="960" cy="162" r="22"  fill="none" stroke="#E8A84C" stroke-width="1.25" opacity="0.28"/>
  <!-- Hub 3 centre node -->
  <circle cx="960" cy="162" r="7"   fill="#E8A84C" opacity="0.88"/>
  <!-- Glow halo -->
  <circle cx="960" cy="162" r="30"  fill="#E8A84C" opacity="0.08"/>
  <!-- Diamond marker -->
  <rect x="948" y="150" width="24" height="24"
        transform="rotate(45 960 162)"
        fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.32"/>
  <!-- Tick marks around hub 3 outer ring -->
  <g stroke="#E8A84C" stroke-width="1" opacity="0.2" stroke-linecap="round">
    <line x1="960" y1="71"  x2="960" y2="79"/>
    <line x1="1024" y1="98" x2="1018" y2="104"/>
    <line x1="1049" y1="162" x2="1041" y2="162"/>
    <line x1="1024" y1="226" x2="1018" y2="220"/>
    <line x1="960" y1="253"  x2="960" y2="245"/>
    <line x1="896" y1="226"  x2="902" y2="220"/>
    <line x1="871" y1="162"  x2="879" y2="162"/>
    <line x1="896" y1="98"   x2="902" y2="104"/>
  </g>

  <!-- ── HUB 4: LOWER RIGHT — smallest ring (880, 480) ── -->
  <circle cx="880" cy="480" r="64"  fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.09"/>
  <circle cx="880" cy="480" r="44"  fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.14"/>
  <circle cx="880" cy="480" r="24"  fill="none" stroke="#E8A84C" stroke-width="1"    opacity="0.2"/>
  <circle cx="880" cy="480" r="6"   fill="#E8A84C" opacity="0.72"/>
  <circle cx="880" cy="480" r="20"  fill="#E8A84C" opacity="0.06"/>

  <!-- ── STRUCTURED CONNECTOR: Hub 1 → Hub 2 ──────── -->
  <!-- L-shaped workflow connector (elbow joint at x=440) -->
  <path d="M 390 348 L 440 348 L 440 248 L 512 248"
        fill="none" stroke="#E8A84C" stroke-width="1.25" opacity="0.32"
        stroke-dasharray="5 4"/>
  <!-- Junction node at elbow -->
  <circle cx="440" cy="348" r="4"   fill="#E8A84C" opacity="0.5"/>
  <circle cx="440" cy="248" r="3.5" fill="#E8A84C" opacity="0.45"/>
  <!-- Direct diagonal backup (faint) -->
  <line x1="388" y1="378" x2="516" y2="248"
        stroke="#E8A84C" stroke-width="0.5" opacity="0.1"/>

  <!-- ── STRUCTURED CONNECTOR: Hub 2 → Hub 3 ──────── -->
  <!-- L-shaped connector (elbow at y=162) -->
  <path d="M 700 220 L 760 220 L 760 162 L 872 162"
        fill="none" stroke="#E8A84C" stroke-width="1.25" opacity="0.28"
        stroke-dasharray="5 4"/>
  <!-- Junction nodes -->
  <circle cx="760" cy="220" r="4"   fill="#E8A84C" opacity="0.45"/>
  <circle cx="760" cy="162" r="3.5" fill="#E8A84C" opacity="0.4"/>

  <!-- ── STRUCTURED CONNECTOR: Hub 2 → Hub 4 ──────── -->
  <!-- L-shaped connector (elbow at y=480) -->
  <path d="M 648 330 L 648 480 L 816 480"
        fill="none" stroke="#E8A84C" stroke-width="1" opacity="0.22"
        stroke-dasharray="4 5"/>
  <circle cx="648" cy="330" r="3.5" fill="#E8A84C" opacity="0.38"/>
  <circle cx="648" cy="480" r="3"   fill="#E8A84C" opacity="0.32"/>

  <!-- ── STRUCTURED CONNECTOR: Hub 3 → Hub 4 ──────── -->
  <path d="M 992 230 L 992 480 L 944 480"
        fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.18"
        stroke-dasharray="4 5"/>
  <circle cx="992" cy="230" r="3"   fill="#E8A84C" opacity="0.3"/>
  <circle cx="992" cy="480" r="3"   fill="#E8A84C" opacity="0.28"/>

  <!-- ── STRUCTURED CONNECTOR: Hub 1 → Hub 4 (bypass) -->
  <path d="M 260 508 L 260 560 L 880 560 L 880 544"
        fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.14"
        stroke-dasharray="4 6"/>

  <!-- ── DECORATIVE ARCS ───────────────────────────── -->
  <circle cx="260" cy="630" r="500" fill="none" stroke="#E8A84C" stroke-width="0.5" opacity="0.05"/>
  <circle cx="1200" cy="0"  r="440" fill="none" stroke="#E8A84C" stroke-width="0.5" opacity="0.04"/>

  <!-- ── NETWORK CONNECTIONS — background filler ───── -->
  <g stroke="#E8A84C" stroke-width="0.75" opacity="0.09" fill="none">
    <!-- Small cluster left -->
    <line x1="80"  y1="200" x2="132" y2="378"/>
    <line x1="80"  y1="200" x2="140" y2="240"/>
    <line x1="140" y1="240" x2="168" y2="286"/>
    <line x1="80"  y1="540" x2="129" y2="378"/>
    <line x1="80"  y1="540" x2="160" y2="560"/>
    <!-- Top cluster -->
    <line x1="340" y1="80"  x2="260" y2="248"/>
    <line x1="340" y1="80"  x2="440" y2="60"/>
    <line x1="440" y1="60"  x2="543" y2="161"/>
    <!-- Right cluster -->
    <line x1="1100" y1="80"  x2="1048" y2="162"/>
    <line x1="1100" y1="80"  x2="1140" y2="160"/>
    <line x1="1140" y1="300" x2="1048" y2="226"/>
    <line x1="1140" y1="300" x2="1060" y2="400"/>
    <line x1="1060" y1="400" x2="992"  y2="480"/>
    <!-- Bottom -->
    <line x1="400" y1="580" x2="440" y2="508"/>
    <line x1="400" y1="580" x2="260" y2="508"/>
    <line x1="700" y1="590" x2="648" y2="508"/>
    <line x1="700" y1="590" x2="816" y2="508"/>
  </g>

  <!-- ── SATELLITE NODES ───────────────────────────── -->
  <g fill="#E8A84C">
    <circle cx="80"   cy="200" r="3"   opacity="0.22"/>
    <circle cx="140"  cy="240" r="2.5" opacity="0.18"/>
    <circle cx="80"   cy="540" r="3"   opacity="0.2"/>
    <circle cx="160"  cy="560" r="2.5" opacity="0.16"/>
    <circle cx="340"  cy="80"  r="3"   opacity="0.22"/>
    <circle cx="440"  cy="60"  r="3.5" opacity="0.24"/>
    <circle cx="1100" cy="80"  r="3"   opacity="0.22"/>
    <circle cx="1140" cy="160" r="2.5" opacity="0.18"/>
    <circle cx="1140" cy="300" r="3"   opacity="0.2"/>
    <circle cx="1060" cy="400" r="2.5" opacity="0.18"/>
    <circle cx="400"  cy="580" r="2.5" opacity="0.16"/>
    <circle cx="700"  cy="590" r="3"   opacity="0.18"/>
    <!-- Scattered -->
    <circle cx="500"  cy="460" r="2"   opacity="0.13"/>
    <circle cx="760"  cy="380" r="2"   opacity="0.13"/>
    <circle cx="820"  cy="100" r="2"   opacity="0.13"/>
    <circle cx="180"  cy="480" r="2"   opacity="0.13"/>
  </g>

  <!-- ── ACCENT: CROSS TICKS at grid intersections ── -->
  <g stroke="#E8A84C" stroke-width="1" opacity="0.16" stroke-linecap="round">
    <line x1="296" y1="153" x2="304" y2="161"/>
    <line x1="304" y1="153" x2="296" y2="161"/>
    <line x1="596" y1="311" x2="604" y2="319"/>
    <line x1="604" y1="311" x2="596" y2="319"/>
    <line x1="896" y1="468" x2="904" y2="476"/>
    <line x1="904" y1="468" x2="896" y2="476"/>
  </g>

  <!-- ── ACCENT: SMALL BRACKETS at connector elbows ── -->
  <g stroke="#E8A84C" stroke-width="0.75" fill="none" opacity="0.22">
    <path d="M 430 338 L 426 338 L 426 348"/>
    <path d="M 450 338 L 454 338 L 454 348"/>
    <path d="M 750 210 L 746 210 L 746 220"/>
    <path d="M 770 210 L 774 210 L 774 220"/>
  </g>
</svg>
