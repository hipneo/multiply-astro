<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e0c"/>
      <stop offset="100%" style="stop-color:#111110"/>
    </linearGradient>
    <linearGradient id="layerTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a84c;stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#e8a84c;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#e8a84c;stop-opacity:0.12"/>
    </linearGradient>
    <linearGradient id="layerMid" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a84c;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#e8a84c;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#e8a84c;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="layerBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a84c;stop-opacity:0.05"/>
      <stop offset="50%" style="stop-color:#e8a84c;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#e8a84c;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="connectorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a84c;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#e8a84c;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="edgeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a84c;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#e8a84c;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="edgeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8a84c;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e8a84c;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeshadow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#e8a84c" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ===== LAYER PLANES — stacked isometric architecture ===== -->

  <!-- BOTTOM LAYER — Foundation / Strategy -->
  <!-- Parallelogram shape suggesting a flat plane in perspective -->
  <polygon points="120,490 600,420 1080,490 600,560" fill="url(#layerBot)" stroke="#e8a84c" stroke-width="0.8" stroke-opacity="0.18"/>
  <!-- Bottom layer top face -->
  <polygon points="120,490 600,420 1080,490 600,560" fill="none" stroke="#e8a84c" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Left face -->
  <polygon points="120,490 600,560 600,590 120,520" fill="#e8a84c" fill-opacity="0.04" stroke="#e8a84c" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Right face -->
  <polygon points="1080,490 600,560 600,590 1080,520" fill="#e8a84c" fill-opacity="0.03" stroke="#e8a84c" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- MIDDLE LAYER — Execution -->
  <polygon points="160,360 600,292 1040,360 600,428" fill="url(#layerMid)" stroke="#e8a84c" stroke-width="0.8" stroke-opacity="0.28"/>
  <polygon points="160,360 600,428 600,458 160,390" fill="#e8a84c" fill-opacity="0.06" stroke="#e8a84c" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1040,360 600,428 600,458 1040,390" fill="#e8a84c" fill-opacity="0.05" stroke="#e8a84c" stroke-width="0.5" stroke-opacity="0.17"/>

  <!-- TOP LAYER — Leadership -->
  <polygon points="200,232 600,164 1000,232 600,300" fill="url(#layerTop)" stroke="#e8a84c" stroke-width="1" stroke-opacity="0.45"/>
  <polygon points="200,232 600,300 600,330 200,262" fill="#e8a84c" fill-opacity="0.09" stroke="#e8a84c" stroke-width="0.6" stroke-opacity="0.28"/>
  <polygon points="1000,232 600,300 600,330 1000,262" fill="#e8a84c" fill-opacity="0.07" stroke="#e8a84c" stroke-width="0.6" stroke-opacity="0.22"/>

  <!-- ===== VERTICAL CONNECTORS between layers ===== -->
  <!-- Left connector -->
  <line x1="200" y1="232" x2="160" y2="360" stroke="url(#connectorGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="160" y1="360" x2="120" y2="490" stroke="url(#connectorGrad)" stroke-width="0.8" opacity="0.3"/>
  <!-- Right connector -->
  <line x1="1000" y1="232" x2="1040" y2="360" stroke="url(#connectorGrad)" stroke-width="0.8" opacity="0.4"/>
  <line x1="1040" y1="360" x2="1080" y2="490" stroke="url(#connectorGrad)" stroke-width="0.8" opacity="0.3"/>
  <!-- Center spine -->
  <line x1="600" y1="164" x2="600" y2="292" stroke="#e8a84c" stroke-width="1" stroke-dasharray="4,4" opacity="0.35"/>
  <line x1="600" y1="300" x2="600" y2="420" stroke="#e8a84c" stroke-width="1" stroke-dasharray="4,4" opacity="0.28"/>
  <line x1="600" y1="428" x2="600" y2="560" stroke="#e8a84c" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>

  <!-- ===== NODES on TOP layer (Leadership) ===== -->
  <!-- Center apex node -->
  <circle cx="600" cy="164" r="8" fill="#e8a84c" opacity="0.9" filter="url(#softglow)"/>
  <circle cx="600" cy="164" r="4" fill="#0e0e0c"/>

  <!-- Left node -->
  <circle cx="200" cy="232" r="5" fill="#e8a84c" opacity="0.6" filter="url(#glow)"/>
  <circle cx="200" cy="232" r="2.5" fill="#0e0e0c"/>

  <!-- Right node -->
  <circle cx="1000" cy="232" r="5" fill="#e8a84c" opacity="0.6" filter="url(#glow)"/>
  <circle cx="1000" cy="232" r="2.5" fill="#0e0e0c"/>

  <!-- Mid-left on top layer -->
  <circle cx="400" cy="198" r="4" fill="#e8a84c" opacity="0.45"/>
  <circle cx="400" cy="198" r="2" fill="#0e0e0c"/>

  <!-- Mid-right on top layer -->
  <circle cx="800" cy="198" r="4" fill="#e8a84c" opacity="0.45"/>
  <circle cx="800" cy="198" r="2" fill="#0e0e0c"/>

  <!-- ===== NODES on MIDDLE layer (Execution) ===== -->
  <circle cx="600" cy="292" r="6" fill="#e8a84c" opacity="0.7" filter="url(#glow)"/>
  <circle cx="600" cy="292" r="3" fill="#0e0e0c"/>

  <circle cx="340" cy="326" r="4" fill="#e8a84c" opacity="0.4"/>
  <circle cx="340" cy="326" r="2" fill="#0e0e0c"/>

  <circle cx="860" cy="326" r="4" fill="#e8a84c" opacity="0.4"/>
  <circle cx="860" cy="326" r="2" fill="#0e0e0c"/>

  <circle cx="160" cy="360" r="4" fill="#e8a84c" opacity="0.35"/>
  <circle cx="160" cy="360" r="2" fill="#0e0e0c"/>

  <circle cx="1040" cy="360" r="4" fill="#e8a84c" opacity="0.35"/>
  <circle cx="1040" cy="360" r="2" fill="#0e0e0c"/>

  <!-- ===== NODES on BOTTOM layer (Strategy) ===== -->
  <circle cx="600" cy="420" r="5" fill="#e8a84c" opacity="0.5"/>
  <circle cx="600" cy="420" r="2.5" fill="#0e0e0c"/>

  <circle cx="360" cy="455" r="3.5" fill="#e8a84c" opacity="0.3"/>
  <circle cx="840" cy="455" r="3.5" fill="#e8a84c" opacity="0.3"/>
  <circle cx="120" cy="490" r="4" fill="#e8a84c" opacity="0.28"/>
  <circle cx="1080" cy="490" r="4" fill="#e8a84c" opacity="0.28"/>

  <!-- ===== SURFACE GRID LINES on each layer ===== -->
  <!-- Top layer grid -->
  <line x1="400" y1="198" x2="800" y2="198" stroke="#e8a84c" stroke-width="0.5" opacity="0.18"/>
  <line x1="300" y1="215" x2="900" y2="215" stroke="#e8a84c" stroke-width="0.4" opacity="0.12"/>
  <line x1="250" y1="224" x2="950" y2="224" stroke="#e8a84c" stroke-width="0.3" opacity="0.09"/>

  <!-- Diagonal grid lines on top layer surface -->
  <line x1="600" y1="164" x2="200" y2="232" stroke="#e8a84c" stroke-width="0.4" opacity="0.2"/>
  <line x1="600" y1="164" x2="1000" y2="232" stroke="#e8a84c" stroke-width="0.4" opacity="0.2"/>
  <line x1="400" y1="198" x2="600" y2="300" stroke="#e8a84c" stroke-width="0.3" opacity="0.12"/>
  <line x1="800" y1="198" x2="600" y2="300" stroke="#e8a84c" stroke-width="0.3" opacity="0.12"/>

  <!-- Mid layer grid -->
  <line x1="340" y1="326" x2="860" y2="326" stroke="#e8a84c" stroke-width="0.5" opacity="0.14"/>
  <line x1="600" y1="292" x2="160" y2="360" stroke="#e8a84c" stroke-width="0.3" opacity="0.14"/>
  <line x1="600" y1="292" x2="1040" y2="360" stroke="#e8a84c" stroke-width="0.3" opacity="0.14"/>
  <line x1="340" y1="326" x2="600" y2="428" stroke="#e8a84c" stroke-width="0.3" opacity="0.1"/>
  <line x1="860" y1="326" x2="600" y2="428" stroke="#e8a84c" stroke-width="0.3" opacity="0.1"/>

  <!-- Bottom layer grid -->
  <line x1="360" y1="455" x2="840" y2="455" stroke="#e8a84c" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="420" x2="120" y2="490" stroke="#e8a84c" stroke-width="0.3" opacity="0.1"/>
  <line x1="600" y1="420" x2="1080" y2="490" stroke="#e8a84c" stroke-width="0.3" opacity="0.1"/>

  <!-- ===== EDGE ACCENT LINES ===== -->
  <!-- Top edge of top layer - bright -->
  <line x1="200" y1="232" x2="600" y2="164" stroke="#e8a84c" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="600" y1="164" x2="1000" y2="232" stroke="#e8a84c" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>

  <!-- Front edges of top layer -->
  <line x1="200" y1="232" x2="600" y2="300" stroke="#e8a84c" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="300" x2="1000" y2="232" stroke="#e8a84c" stroke-width="1" opacity="0.4"/>

  <!-- Top edge of mid layer -->
  <line x1="160" y1="360" x2="600" y2="292" stroke="#e8a84c" stroke-width="1.2" opacity="0.4"/>
  <line x1="600" y1="292" x2="1040" y2="360" stroke="#e8a84c" stroke-width="1.2" opacity="0.4"/>

  <!-- Front edges of mid layer -->
  <line x1="160" y1="360" x2="600" y2="428" stroke="#e8a84c" stroke-width="0.8" opacity="0.28"/>
  <line x1="600" y1="428" x2="1040" y2="360" stroke="#e8a84c" stroke-width="0.8" opacity="0.28"/>

  <!-- Top edge of bottom layer -->
  <line x1="120" y1="490" x2="600" y2="420" stroke="#e8a84c" stroke-width="1" opacity="0.28"/>
  <line x1="600" y1="420" x2="1080" y2="490" stroke="#e8a84c" stroke-width="1" opacity="0.28"/>

  <!-- ===== AMBIENT GLOW around center spine ===== -->
  <ellipse cx="600" cy="300" rx="80" ry="20" fill="#e8a84c" opacity="0.04"/>
  <ellipse cx="600" cy="164" rx="50" ry="14" fill="#e8a84c" opacity="0.08"/>

  <!-- ===== SMALL DETAIL: data flow dots moving down spine ===== -->
  <circle cx="600" cy="200" r="1.5" fill="#e8a84c" opacity="0.5"/>
  <circle cx="600" cy="248" r="1.5" fill="#e8a84c" opacity="0.4"/>
  <circle cx="600" cy="348" r="1.5" fill="#e8a84c" opacity="0.3"/>
  <circle cx="600" cy="394" r="1.5" fill="#e8a84c" opacity="0.25"/>
  <circle cx="600" cy="480" r="1.5" fill="#e8a84c" opacity="0.18"/>

  <!-- ===== SIDE DECORATIVE MARKS ===== -->
  <!-- Left margin ticks -->
  <line x1="60" y1="232" x2="78" y2="232" stroke="#e8a84c" stroke-width="0.8" opacity="0.25"/>
  <line x1="60" y1="360" x2="78" y2="360" stroke="#e8a84c" stroke-width="0.8" opacity="0.18"/>
  <line x1="60" y1="490" x2="78" y2="490" stroke="#e8a84c" stroke-width="0.8" opacity="0.13"/>
  <!-- Vertical bracket left -->
  <line x1="68" y1="232" x2="68" y2="490" stroke="#e8a84c" stroke-width="0.5" opacity="0.15"/>

  <!-- Right margin ticks -->
  <line x1="1122" y1="232" x2="1140" y2="232" stroke="#e8a84c" stroke-width="0.8" opacity="0.25"/>
  <line x1="1122" y1="360" x2="1140" y2="360" stroke="#e8a84c" stroke-width="0.8" opacity="0.18"/>
  <line x1="1122" y1="490" x2="1140" y2="490" stroke="#e8a84c" stroke-width="0.8" opacity="0.13"/>
  <line x1="1132" y1="232" x2="1132" y2="490" stroke="#e8a84c" stroke-width="0.5" opacity="0.15"/>
</svg>
