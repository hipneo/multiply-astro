<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- ── DIVIDER between AGENCY and INDEPENDENT ─────────────────────────── -->
  <line x1="600" y1="100" x2="600" y2="530" stroke="#1C1C1A" stroke-width="1" opacity="0.3" stroke-dasharray="5 7"/>
  <!-- Endpoint ticks on divider -->
  <line x1="588" y1="100" x2="612" y2="100" stroke="#1C1C1A" stroke-width="0.75" opacity="0.3"/>
  <line x1="588" y1="530" x2="612" y2="530" stroke="#1C1C1A" stroke-width="0.75" opacity="0.3"/>

  <!-- ── LEFT: AGENCY (distributed network, diffuse) ────────────────────── -->
  <!-- Container -->
  <rect x="80" y="130" width="470" height="370" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.25" rx="3" stroke-dasharray="3 5"/>

  <!-- A messy web of nodes — 14 nodes representing distributed team -->
  <!-- Connection lattice (lots of weak connections) -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.18" fill="none">
    <line x1="160" y1="200" x2="260" y2="180"/>
    <line x1="260" y1="180" x2="350" y2="220"/>
    <line x1="350" y1="220" x2="440" y2="200"/>
    <line x1="160" y1="200" x2="220" y2="290"/>
    <line x1="220" y1="290" x2="320" y2="300"/>
    <line x1="260" y1="180" x2="320" y2="300"/>
    <line x1="320" y1="300" x2="420" y2="290"/>
    <line x1="420" y1="290" x2="480" y2="220"/>
    <line x1="440" y1="200" x2="480" y2="220"/>
    <line x1="220" y1="290" x2="180" y2="400"/>
    <line x1="180" y1="400" x2="280" y2="390"/>
    <line x1="280" y1="390" x2="320" y2="300"/>
    <line x1="280" y1="390" x2="380" y2="410"/>
    <line x1="380" y1="410" x2="420" y2="290"/>
    <line x1="380" y1="410" x2="470" y2="380"/>
    <line x1="470" y1="380" x2="420" y2="290"/>
    <line x1="180" y1="400" x2="240" y2="450"/>
    <line x1="240" y1="450" x2="340" y2="450"/>
    <line x1="340" y1="450" x2="380" y2="410"/>
    <line x1="340" y1="450" x2="430" y2="450"/>
    <line x1="430" y1="450" x2="470" y2="380"/>
  </g>

  <!-- Agency nodes — 14 mid-sized identical nodes, none highlighted -->
  <g>
    <circle cx="160" cy="200" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="260" cy="180" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="350" cy="220" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="440" cy="200" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="480" cy="220" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="220" cy="290" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="320" cy="300" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="420" cy="290" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="180" cy="400" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="280" cy="390" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="380" cy="410" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="470" cy="380" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="240" cy="450" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="340" cy="450" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
    <circle cx="430" cy="450" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.55"/>
  </g>

  <!-- Header marker for agency panel -->
  <line x1="80" y1="160" x2="180" y2="160" stroke="#1C1C1A" stroke-width="1.5" opacity="0.4"/>
  <line x1="190" y1="160" x2="220" y2="160" stroke="#1C1C1A" stroke-width="1.5" opacity="0.25"/>

  <!-- Diffuse arrow pointing nowhere clear (accountability scattered) -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.18" fill="none">
    <path d="M 100 480 L 130 460" stroke-dasharray="2 4"/>
    <polyline points="125 458, 130 460, 128 466"/>
  </g>

  <!-- ── RIGHT: INDEPENDENT (single focal node, accountable) ─────────────── -->
  <!-- Container -->
  <rect x="650" y="130" width="470" height="370" fill="none" stroke="#9B2335" stroke-width="1.5" opacity="0.45" rx="3"/>

  <!-- Outer halos around the single focal node -->
  <circle cx="885" cy="315" r="120" fill="#9B2335" opacity="0.04"/>
  <circle cx="885" cy="315" r="90" fill="#9B2335" opacity="0.07"/>
  <circle cx="885" cy="315" r="62" fill="#9B2335" opacity="0.10"/>
  <circle cx="885" cy="315" r="38" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.75" opacity="0.95"/>
  <circle cx="885" cy="315" r="14" fill="#9B2335"/>

  <!-- Selection brackets framing the focal -->
  <polyline points="838,267 828,267 828,277" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="932,267 942,267 942,277" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="838,363 828,363 828,353" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="932,363 942,363 942,353" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- A few clean directed lines outward to small team satellites (the CMO directs existing team) -->
  <g stroke="#9B2335" stroke-width="0.75" opacity="0.4" fill="none">
    <line x1="885" y1="277" x2="885" y2="200"/>
    <line x1="847" y1="315" x2="730" y2="315"/>
    <line x1="923" y1="315" x2="1040" y2="315"/>
    <line x1="885" y1="353" x2="885" y2="430"/>
  </g>

  <!-- Satellite nodes (managed team) -->
  <g>
    <circle cx="885" cy="200" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.65"/>
    <circle cx="730" cy="315" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.65"/>
    <circle cx="1040" cy="315" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.65"/>
    <circle cx="885" cy="430" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1" opacity="0.65"/>
  </g>

  <!-- Header marker for independent panel -->
  <line x1="650" y1="160" x2="730" y2="160" stroke="#9B2335" stroke-width="2" opacity="0.6"/>
  <line x1="740" y1="160" x2="770" y2="160" stroke="#9B2335" stroke-width="2" opacity="0.35"/>

  <!-- Single decisive arrow pointing at focal (accountability concentrated) -->
  <g stroke="#9B2335" stroke-width="1" opacity="0.45" fill="none">
    <path d="M 1080 480 L 980 425"/>
    <polyline points="985 415, 980 425, 989 423"/>
  </g>

  <!-- ── CORNER GEOMETRY ────────────────────────────────────────────────── -->
  <!-- Top-left -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <!-- Top-right ledger -->
  <g>
    <line x1="1020" y1="58" x2="1148" y2="58" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="74" x2="1130" y2="74" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="1020" y1="90" x2="1148" y2="90" stroke="#9B2335" stroke-width="1" opacity="0.45"/>
    <circle cx="1012" cy="90" r="3" fill="#9B2335" opacity="0.6"/>
  </g>

  <!-- Bottom-left tier ladder -->
  <g stroke="#1C1C1A" stroke-width="0.75">
    <line x1="56" y1="558" x2="156" y2="558" opacity="0.16"/>
    <line x1="56" y1="572" x2="136" y2="572" opacity="0.12"/>
    <line x1="56" y1="586" x2="116" y2="586" opacity="0.10"/>
  </g>

  <!-- Bottom-right small target -->
  <circle cx="1130" cy="570" r="14" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1130" cy="570" r="7" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4"/>
  <circle cx="1130" cy="570" r="2" fill="#9B2335" opacity="0.65"/>
</svg>
