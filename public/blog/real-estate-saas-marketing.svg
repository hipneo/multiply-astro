<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint axis grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- Subtle blueprint dotted grid across the whole canvas (left side denser) -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.05">
    <line x1="0"   y1="100" x2="1200" y2="100"/>
    <line x1="0"   y1="160" x2="1200" y2="160"/>
    <line x1="0"   y1="220" x2="1200" y2="220"/>
    <line x1="0"   y1="280" x2="1200" y2="280"/>
    <line x1="0"   y1="340" x2="1200" y2="340"/>
    <line x1="0"   y1="400" x2="1200" y2="400"/>
    <line x1="0"   y1="460" x2="1200" y2="460"/>
    <line x1="0"   y1="520" x2="1200" y2="520"/>
  </g>

  <!-- ── LEFT HALF: BLUEPRINT / BUILDING FACADE ─────────────────────────── -->
  <!-- Building outline -->
  <rect x="100" y="140" width="380" height="380" fill="none" stroke="#1C1C1A" stroke-width="1.5" opacity="0.5"/>
  <!-- Ground line beneath building -->
  <line x1="60" y1="520" x2="540" y2="520" stroke="#1C1C1A" stroke-width="1" opacity="0.32"/>

  <!-- Floor lines (8 floors) -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.28">
    <line x1="100" y1="187" x2="480" y2="187"/>
    <line x1="100" y1="235" x2="480" y2="235"/>
    <line x1="100" y1="282" x2="480" y2="282"/>
    <line x1="100" y1="330" x2="480" y2="330"/>
    <line x1="100" y1="377" x2="480" y2="377"/>
    <line x1="100" y1="425" x2="480" y2="425"/>
    <line x1="100" y1="472" x2="480" y2="472"/>
  </g>

  <!-- Column divisions (5 vertical) -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.22">
    <line x1="176" y1="140" x2="176" y2="520"/>
    <line x1="252" y1="140" x2="252" y2="520"/>
    <line x1="328" y1="140" x2="328" y2="520"/>
    <line x1="404" y1="140" x2="404" y2="520"/>
  </g>

  <!-- Windows: a grid of small filled rects to suggest a facade -->
  <g fill="#1C1C1A" opacity="0.18">
    <!-- floor 1 -->
    <rect x="120" y="155" width="36" height="22"/>
    <rect x="196" y="155" width="36" height="22"/>
    <rect x="272" y="155" width="36" height="22"/>
    <rect x="348" y="155" width="36" height="22"/>
    <rect x="424" y="155" width="36" height="22"/>
    <!-- floor 2 -->
    <rect x="120" y="203" width="36" height="22"/>
    <rect x="196" y="203" width="36" height="22"/>
    <rect x="272" y="203" width="36" height="22"/>
    <rect x="348" y="203" width="36" height="22"/>
    <rect x="424" y="203" width="36" height="22"/>
    <!-- floor 3 -->
    <rect x="120" y="250" width="36" height="22"/>
    <rect x="196" y="250" width="36" height="22"/>
    <rect x="272" y="250" width="36" height="22"/>
    <rect x="348" y="250" width="36" height="22"/>
    <rect x="424" y="250" width="36" height="22"/>
    <!-- floor 4 -->
    <rect x="120" y="298" width="36" height="22"/>
    <rect x="196" y="298" width="36" height="22"/>
    <rect x="272" y="298" width="36" height="22"/>
    <rect x="348" y="298" width="36" height="22"/>
    <rect x="424" y="298" width="36" height="22"/>
    <!-- floor 5 -->
    <rect x="120" y="345" width="36" height="22"/>
    <rect x="196" y="345" width="36" height="22"/>
    <rect x="272" y="345" width="36" height="22"/>
    <rect x="348" y="345" width="36" height="22"/>
    <rect x="424" y="345" width="36" height="22"/>
    <!-- floor 6 -->
    <rect x="120" y="393" width="36" height="22"/>
    <rect x="196" y="393" width="36" height="22"/>
    <rect x="272" y="393" width="36" height="22"/>
    <rect x="348" y="393" width="36" height="22"/>
    <rect x="424" y="393" width="36" height="22"/>
    <!-- floor 7 -->
    <rect x="120" y="440" width="36" height="22"/>
    <rect x="196" y="440" width="36" height="22"/>
    <rect x="272" y="440" width="36" height="22"/>
    <rect x="348" y="440" width="36" height="22"/>
    <rect x="424" y="440" width="36" height="22"/>
    <!-- floor 8 (ground floor entrance row) -->
    <rect x="120" y="488" width="36" height="22"/>
    <rect x="196" y="488" width="36" height="22" fill="#9B2335" opacity="0.5"/> <!-- crimson door -->
    <rect x="272" y="488" width="36" height="22"/>
    <rect x="348" y="488" width="36" height="22"/>
    <rect x="424" y="488" width="36" height="22"/>
  </g>

  <!-- Building roofline marker -->
  <line x1="80" y1="140" x2="100" y2="140" stroke="#1C1C1A" stroke-width="0.75" opacity="0.32"/>
  <line x1="80" y1="135" x2="80" y2="145" stroke="#1C1C1A" stroke-width="0.75" opacity="0.32"/>

  <!-- Dimension lines on left edge (blueprint convention) -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.2">
    <line x1="60" y1="187" x2="80" y2="187"/>
    <line x1="60" y1="282" x2="80" y2="282"/>
    <line x1="60" y1="377" x2="80" y2="377"/>
    <line x1="60" y1="472" x2="80" y2="472"/>
  </g>

  <!-- ── BRIDGE / TRANSITION ZONE around center ─────────────────────────── -->
  <!-- Vertical dashed seam where blueprint becomes growth -->
  <line x1="560" y1="120" x2="560" y2="540" stroke="#9B2335" stroke-width="0.75" opacity="0.32" stroke-dasharray="3 6"/>

  <!-- Annotation marks at the seam -->
  <circle cx="560" cy="280" r="3" fill="#9B2335" opacity="0.6"/>
  <circle cx="560" cy="380" r="3" fill="#9B2335" opacity="0.6"/>

  <!-- ── RIGHT HALF: GROWTH CURVE (organic compounding) ─────────────────── -->
  <!-- Faint horizontal axis lines (chart frame) -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.08" stroke-dasharray="2 4">
    <line x1="580" y1="200" x2="1140" y2="200"/>
    <line x1="580" y1="300" x2="1140" y2="300"/>
    <line x1="580" y1="400" x2="1140" y2="400"/>
  </g>

  <!-- Chart frame baseline + axis -->
  <line x1="580" y1="500" x2="1140" y2="500" stroke="#1C1C1A" stroke-width="1" opacity="0.28"/>
  <line x1="580" y1="120" x2="580" y2="500" stroke="#1C1C1A" stroke-width="1" opacity="0.28"/>

  <!-- Small background bar chart (foundation grows into curve) -->
  <g fill="#1C1C1A" opacity="0.08">
    <rect x="610" y="478" width="22" height="22"/>
    <rect x="654" y="472" width="22" height="28"/>
    <rect x="698" y="462" width="22" height="38"/>
    <rect x="742" y="448" width="22" height="52"/>
    <rect x="786" y="428" width="22" height="72"/>
    <rect x="830" y="402" width="22" height="98"/>
    <rect x="874" y="370" width="22" height="130"/>
    <rect x="918" y="332" width="22" height="168"/>
    <rect x="962" y="288" width="22" height="212"/>
    <rect x="1006" y="238" width="22" height="262"/>
    <rect x="1050" y="180" width="22" height="320"/>
    <rect x="1094" y="118" width="22" height="382"/>
  </g>

  <!-- The growth curve transitioning from architecture to organic -->
  <!-- Outer glow -->
  <path d="M 560 500 C 640 488, 720 462, 800 412 C 880 358, 960 282, 1040 196 C 1080 152, 1110 128, 1140 110"
    fill="none" stroke="#9B2335" stroke-width="6" stroke-linecap="round" opacity="0.08"/>
  <!-- Main line -->
  <path d="M 560 500 C 640 488, 720 462, 800 412 C 880 358, 960 282, 1040 196 C 1080 152, 1110 128, 1140 110"
    fill="none" stroke="#9B2335" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

  <!-- Anchor nodes along curve -->
  <g>
    <circle cx="560" cy="500" r="6" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5" opacity="0.85"/>
    <circle cx="720" cy="462" r="5" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
    <circle cx="880" cy="358" r="5" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
    <!-- Focal apex -->
    <circle cx="1040" cy="196" r="22" fill="none" stroke="#9B2335" stroke-width="1" opacity="0.3"/>
    <circle cx="1040" cy="196" r="9" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5" opacity="0.95"/>
    <circle cx="1040" cy="196" r="4" fill="#9B2335"/>
    <!-- End point -->
    <circle cx="1140" cy="110" r="6" fill="#9B2335" opacity="0.85"/>
  </g>

  <!-- Selection brackets around focal apex -->
  <polyline points="1018,174 1012,174 1012,180" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="1062,218 1068,218 1068,212" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── CORNER GEOMETRY ────────────────────────────────────────────────── -->
  <!-- Top-left -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <!-- Top-right ledger -->
  <g>
    <line x1="1020" y1="58" x2="1148" y2="58" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="74" x2="1130" y2="74" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="1020" y1="90" x2="1148" y2="90" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="106" x2="1110" y2="106" stroke="#9B2335" stroke-width="1" opacity="0.45"/>
    <circle cx="1012" cy="106" r="3" fill="#9B2335" opacity="0.6"/>
  </g>

  <!-- Bottom-left tier ladder -->
  <g stroke="#1C1C1A" stroke-width="0.75">
    <line x1="56" y1="558" x2="156" y2="558" opacity="0.16"/>
    <line x1="56" y1="572" x2="136" y2="572" opacity="0.12"/>
    <line x1="56" y1="586" x2="116" y2="586" opacity="0.10"/>
  </g>

  <!-- Bottom-right small target -->
  <circle cx="1130" cy="570" r="14" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1130" cy="570" r="7" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4"/>
  <circle cx="1130" cy="570" r="2" fill="#9B2335" opacity="0.65"/>
</svg>
