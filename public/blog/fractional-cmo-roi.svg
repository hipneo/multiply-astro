<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- ── CHART FRAME ─────────────────────────────────────────────────────── -->
  <!-- Y axis and X axis -->
  <line x1="150" y1="120" x2="150" y2="470" stroke="#1C1C1A" stroke-width="1" opacity="0.35"/>
  <line x1="150" y1="470" x2="1080" y2="470" stroke="#1C1C1A" stroke-width="1" opacity="0.35"/>

  <!-- Horizontal gridlines -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.08">
    <line x1="150" y1="400" x2="1080" y2="400"/>
    <line x1="150" y1="330" x2="1080" y2="330"/>
    <line x1="150" y1="260" x2="1080" y2="260"/>
    <line x1="150" y1="190" x2="1080" y2="190"/>
  </g>

  <!-- ── PHASE DIVIDERS (three phases: 1-30, 31-60, 61-90) ───────────────── -->
  <line x1="460" y1="120" x2="460" y2="470" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16" stroke-dasharray="4 6"/>
  <line x1="770" y1="120" x2="770" y2="470" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16" stroke-dasharray="4 6"/>

  <!-- Phase labels as geometric markers along the X axis -->
  <g>
    <!-- Phase 1 marker: diagnostic (hollow) -->
    <circle cx="305" cy="492" r="6" fill="none" stroke="#1C1C1A" stroke-width="1.25" opacity="0.4"/>
    <circle cx="305" cy="492" r="2" fill="#1C1C1A" opacity="0.4"/>
    <!-- Phase 2 marker: system (half) -->
    <circle cx="615" cy="492" r="6" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55"/>
    <path d="M 615 486 A 6 6 0 0 1 615 498 Z" fill="#9B2335" opacity="0.5"/>
    <!-- Phase 3 marker: pipeline (full crimson) -->
    <circle cx="925" cy="492" r="6.5" fill="#9B2335" opacity="0.7"/>
  </g>

  <!-- ── LAGGING INDICATOR: revenue, flat then late rise (dark ink, dashed) ─ -->
  <polyline points="150,420 305,418 460,415 615,410 770,398 925,360 1050,300"
    fill="none" stroke="#1C1C1A" stroke-width="2" opacity="0.3" stroke-dasharray="6 5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- endpoint dot -->
  <circle cx="1050" cy="300" r="4" fill="none" stroke="#1C1C1A" stroke-width="1.5" opacity="0.35"/>

  <!-- ── LEADING INDICATOR: pipeline/conversion, early steady climb (crimson) ─ -->
  <polyline points="150,440 305,415 460,360 615,300 770,235 925,185 1050,150"
    fill="none" stroke="#9B2335" stroke-width="2.75" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points on the leading curve, one per phase boundary -->
  <g>
    <circle cx="150" cy="440" r="4.5" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5" opacity="0.9"/>
    <circle cx="305" cy="415" r="5" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.75" opacity="0.95"/>
    <circle cx="460" cy="360" r="5" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.75" opacity="0.95"/>
    <circle cx="615" cy="300" r="5.5" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.75" opacity="0.95"/>
    <circle cx="770" cy="235" r="5.5" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.75" opacity="0.95"/>
    <circle cx="925" cy="185" r="6" fill="#9B2335" opacity="0.85"/>
    <circle cx="925" cy="185" r="12" fill="#9B2335" opacity="0.1"/>
    <circle cx="1050" cy="150" r="6" fill="#9B2335" opacity="0.9"/>
  </g>

  <!-- ── RISING METRIC BARS per phase (faint, beneath the leading curve) ──── -->
  <g fill="#9B2335">
    <rect x="225" y="430" width="20" height="40" opacity="0.14" rx="1.5"/>
    <rect x="365" y="395" width="20" height="75" opacity="0.18" rx="1.5"/>
    <rect x="535" y="350" width="20" height="120" opacity="0.22" rx="1.5"/>
    <rect x="690" y="295" width="20" height="175" opacity="0.28" rx="1.5"/>
    <rect x="845" y="250" width="20" height="220" opacity="0.34" rx="1.5"/>
    <rect x="985" y="220" width="20" height="250" opacity="0.42" rx="1.5"/>
  </g>

  <!-- ── LEGEND: two indicator keys (top right) ──────────────────────────── -->
  <g>
    <!-- leading -->
    <line x1="900" y1="135" x2="940" y2="135" stroke="#9B2335" stroke-width="2.75" opacity="0.85" stroke-linecap="round"/>
    <circle cx="920" cy="135" r="4" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5"/>
    <rect x="952" y="130" width="96" height="8" fill="#1C1C1A" opacity="0.22" rx="1.5"/>
    <!-- lagging -->
    <line x1="900" y1="160" x2="940" y2="160" stroke="#1C1C1A" stroke-width="2" opacity="0.3" stroke-dasharray="6 5" stroke-linecap="round"/>
    <rect x="952" y="156" width="72" height="7" fill="#1C1C1A" opacity="0.16" rx="1.5"/>
  </g>

  <!-- Y-axis tick ticks -->
  <g stroke="#1C1C1A" stroke-width="1" opacity="0.3">
    <line x1="145" y1="190" x2="150" y2="190"/>
    <line x1="145" y1="260" x2="150" y2="260"/>
    <line x1="145" y1="330" x2="150" y2="330"/>
    <line x1="145" y1="400" x2="150" y2="400"/>
  </g>

  <!-- ── CORNER GEOMETRY (house style) ───────────────────────────────────── -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <g>
    <line x1="1020" y1="58" x2="1148" y2="58" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="1020" y1="74" x2="1130" y2="74" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="1020" y1="90" x2="1148" y2="90" stroke="#9B2335" stroke-width="1" opacity="0.45"/>
    <circle cx="1012" cy="90" r="3" fill="#9B2335" opacity="0.6"/>
  </g>

  <g stroke="#1C1C1A" stroke-width="0.75">
    <line x1="56" y1="558" x2="156" y2="558" opacity="0.16"/>
    <line x1="56" y1="572" x2="136" y2="572" opacity="0.12"/>
    <line x1="56" y1="586" x2="116" y2="586" opacity="0.10"/>
  </g>

  <circle cx="1130" cy="570" r="14" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1130" cy="570" r="7" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4"/>
  <circle cx="1130" cy="570" r="2" fill="#9B2335" opacity="0.65"/>
</svg>
