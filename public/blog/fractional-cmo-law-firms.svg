<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- ── PEDIMENT (top horizontal triangle hint) ─────────────────────────── -->
  <polyline points="320,108 600,52 880,108" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.18"/>
  <line x1="320" y1="108" x2="880" y2="108" stroke="#1C1C1A" stroke-width="1" opacity="0.18"/>
  <!-- Apex marker -->
  <circle cx="600" cy="52" r="3" fill="#9B2335" opacity="0.55"/>

  <!-- ── ENTABLATURE (architrave / horizontal band above columns) ────────── -->
  <line x1="232" y1="138" x2="968" y2="138" stroke="#1C1C1A" stroke-width="1.25" opacity="0.42"/>
  <line x1="232" y1="148" x2="968" y2="148" stroke="#1C1C1A" stroke-width="0.75" opacity="0.18"/>
  <!-- Frieze tick marks (small dentils) -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.16">
    <line x1="270" y1="158" x2="270" y2="166"/>
    <line x1="320" y1="158" x2="320" y2="166"/>
    <line x1="370" y1="158" x2="370" y2="166"/>
    <line x1="420" y1="158" x2="420" y2="166"/>
    <line x1="470" y1="158" x2="470" y2="166"/>
    <line x1="520" y1="158" x2="520" y2="166"/>
    <line x1="570" y1="158" x2="570" y2="166"/>
    <line x1="620" y1="158" x2="620" y2="166"/>
    <line x1="670" y1="158" x2="670" y2="166"/>
    <line x1="720" y1="158" x2="720" y2="166"/>
    <line x1="770" y1="158" x2="770" y2="166"/>
    <line x1="820" y1="158" x2="820" y2="166"/>
    <line x1="870" y1="158" x2="870" y2="166"/>
    <line x1="920" y1="158" x2="920" y2="166"/>
  </g>

  <!-- ── COLUMNS — five vertical, evenly spaced ──────────────────────────── -->
  <!-- Column shaft positions: x = 280, 400, 520, 640, 760, 880 — but use 5: 280, 430, 580, 730, 880 (no wait let's use 5 columns centered) -->

  <!-- Column 1 -->
  <g>
    <!-- Capital (top block) -->
    <rect x="262" y="180" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <!-- Shaft -->
    <line x1="280" y1="194" x2="280" y2="468" stroke="#1C1C1A" stroke-width="1.5" opacity="0.5"/>
    <!-- Fluting (parallel thin lines) -->
    <line x1="276" y1="200" x2="276" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <line x1="284" y1="200" x2="284" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <!-- Base -->
    <rect x="262" y="468" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Column 2 -->
  <g>
    <rect x="412" y="180" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <line x1="430" y1="194" x2="430" y2="468" stroke="#1C1C1A" stroke-width="1.5" opacity="0.5"/>
    <line x1="426" y1="200" x2="426" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <line x1="434" y1="200" x2="434" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <rect x="412" y="468" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Column 3 (CENTER — accent crimson) -->
  <g>
    <rect x="562" y="180" width="36" height="14" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.65"/>
    <line x1="580" y1="194" x2="580" y2="468" stroke="#9B2335" stroke-width="1.75" opacity="0.7"/>
    <line x1="576" y1="200" x2="576" y2="462" stroke="#9B2335" stroke-width="0.5" opacity="0.3"/>
    <line x1="584" y1="200" x2="584" y2="462" stroke="#9B2335" stroke-width="0.5" opacity="0.3"/>
    <rect x="562" y="468" width="36" height="14" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.65"/>
    <!-- Selection brackets framing the focal column -->
    <polyline points="544,170 544,162 552,162" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="616,170 616,162 608,162" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="544,492 544,500 552,500" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="616,492 616,500 608,500" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Column 4 -->
  <g>
    <rect x="712" y="180" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <line x1="730" y1="194" x2="730" y2="468" stroke="#1C1C1A" stroke-width="1.5" opacity="0.5"/>
    <line x1="726" y1="200" x2="726" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <line x1="734" y1="200" x2="734" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <rect x="712" y="468" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Column 5 -->
  <g>
    <rect x="862" y="180" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
    <line x1="880" y1="194" x2="880" y2="468" stroke="#1C1C1A" stroke-width="1.5" opacity="0.5"/>
    <line x1="876" y1="200" x2="876" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <line x1="884" y1="200" x2="884" y2="462" stroke="#1C1C1A" stroke-width="0.5" opacity="0.16"/>
    <rect x="862" y="468" width="36" height="14" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- ── STYLOBATE (base platform) ──────────────────────────────────────── -->
  <line x1="232" y1="492" x2="968" y2="492" stroke="#1C1C1A" stroke-width="1.25" opacity="0.42"/>
  <line x1="232" y1="502" x2="968" y2="502" stroke="#1C1C1A" stroke-width="0.75" opacity="0.22"/>
  <line x1="232" y1="512" x2="968" y2="512" stroke="#1C1C1A" stroke-width="0.5" opacity="0.14"/>

  <!-- Centerline measure marks -->
  <line x1="232" y1="138" x2="232" y2="512" stroke="#1C1C1A" stroke-width="0.5" opacity="0.12" stroke-dasharray="2 4"/>
  <line x1="968" y1="138" x2="968" y2="512" stroke="#1C1C1A" stroke-width="0.5" opacity="0.12" stroke-dasharray="2 4"/>

  <!-- ── CORNER GEOMETRY ────────────────────────────────────────────────── -->
  <!-- Top-left -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <!-- Top-right small ledger -->
  <line x1="1080" y1="58" x2="1148" y2="58" stroke="#1C1C1A" stroke-width="0.75" opacity="0.14"/>
  <line x1="1080" y1="72" x2="1130" y2="72" stroke="#1C1C1A" stroke-width="0.75" opacity="0.10"/>
  <line x1="1080" y1="86" x2="1148" y2="86" stroke="#1C1C1A" stroke-width="0.75" opacity="0.14"/>
  <line x1="1080" y1="100" x2="1110" y2="100" stroke="#9B2335" stroke-width="1" opacity="0.4"/>

  <!-- Bottom-left tier ladder (subtle hierarchy mark) -->
  <line x1="56" y1="540" x2="156" y2="540" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <line x1="56" y1="556" x2="136" y2="556" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
  <line x1="56" y1="572" x2="116" y2="572" stroke="#1C1C1A" stroke-width="0.75" opacity="0.10"/>

  <!-- Bottom-right small target seal -->
  <circle cx="1130" cy="570" r="14" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
  <circle cx="1130" cy="570" r="7" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.4"/>
  <circle cx="1130" cy="570" r="2" fill="#9B2335" opacity="0.6"/>

  <!-- Lower band — three measured segments (representing structured engagement phases) -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.18">
    <line x1="232" y1="558" x2="465" y2="558"/>
    <line x1="475" y1="558" x2="725" y2="558"/>
    <line x1="735" y1="558" x2="968" y2="558"/>
  </g>
  <!-- Phase markers -->
  <circle cx="232" cy="558" r="3" fill="#1C1C1A" opacity="0.4"/>
  <circle cx="465" cy="558" r="3" fill="#1C1C1A" opacity="0.4"/>
  <circle cx="725" cy="558" r="3" fill="#1C1C1A" opacity="0.4"/>
  <circle cx="968" cy="558" r="3.5" fill="#9B2335" opacity="0.6"/>
</svg>
