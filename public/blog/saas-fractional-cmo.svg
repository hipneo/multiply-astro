<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- Chart frame: x-axis baseline & y-axis -->
  <line x1="100" y1="500" x2="1100" y2="500" stroke="#1C1C1A" stroke-width="1" opacity="0.22"/>
  <line x1="100" y1="100" x2="100" y2="500" stroke="#1C1C1A" stroke-width="1" opacity="0.22"/>

  <!-- Y-axis tick marks (revenue scale) -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.16">
    <line x1="92" y1="180" x2="100" y2="180"/>
    <line x1="92" y1="260" x2="100" y2="260"/>
    <line x1="92" y1="340" x2="100" y2="340"/>
    <line x1="92" y1="420" x2="100" y2="420"/>
  </g>
  <!-- Horizontal gridlines -->
  <g stroke="#1C1C1A" stroke-width="0.5" opacity="0.06" stroke-dasharray="2 4">
    <line x1="100" y1="180" x2="1100" y2="180"/>
    <line x1="100" y1="260" x2="1100" y2="260"/>
    <line x1="100" y1="340" x2="1100" y2="340"/>
    <line x1="100" y1="420" x2="1100" y2="420"/>
  </g>

  <!-- ── BAR CHART (monthly MRR bars below the curve) ──────────────────── -->
  <g fill="#1C1C1A" opacity="0.08">
    <rect x="148" y="478" width="22" height="22"/>
    <rect x="216" y="472" width="22" height="28"/>
    <rect x="284" y="464" width="22" height="36"/>
    <rect x="352" y="454" width="22" height="46"/>
    <rect x="420" y="442" width="22" height="58"/>
    <rect x="488" y="424" width="22" height="76"/>
    <rect x="556" y="402" width="22" height="98"/>
    <rect x="624" y="376" width="22" height="124"/>
    <rect x="692" y="346" width="22" height="154"/>
    <rect x="760" y="312" width="22" height="188"/>
    <rect x="828" y="276" width="22" height="224"/>
    <rect x="896" y="234" width="22" height="266"/>
    <rect x="964" y="188" width="22" height="312"/>
    <rect x="1032" y="138" width="22" height="362"/>
  </g>

  <!-- ── COMPOUNDING REVENUE CURVE (MRR / ARR hockey stick) ─────────────── -->
  <!-- Outer glow -->
  <path d="M 100 478 C 220 472, 360 460, 500 432 C 640 396, 780 332, 900 240 C 980 178, 1050 132, 1100 110"
    fill="none" stroke="#9B2335" stroke-width="6" stroke-linecap="round" opacity="0.08"/>
  <!-- Main line -->
  <path d="M 100 478 C 220 472, 360 460, 500 432 C 640 396, 780 332, 900 240 C 980 178, 1050 132, 1100 110"
    fill="none" stroke="#9B2335" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- ── FUNNEL STAGE MARKERS along the curve ──────────────────────────── -->
  <!-- Stage 1: Awareness -->
  <circle cx="159" cy="478" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
  <!-- Stage 2: Trial -->
  <circle cx="295" cy="464" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
  <!-- Stage 3: Activation -->
  <circle cx="431" cy="442" r="6" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
  <!-- Stage 4: Paid (focal — crimson) -->
  <circle cx="567" cy="402" r="9" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5" opacity="0.95"/>
  <circle cx="567" cy="402" r="4" fill="#9B2335"/>
  <!-- Selection brackets around focal -->
  <polyline points="548,378 542,378 542,384" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="586,426 592,426 592,420" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stage 5: Retention -->
  <circle cx="703" cy="346" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.75"/>
  <!-- Stage 6: Expansion (top of curve, dark filled) -->
  <circle cx="839" cy="276" r="7" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.8"/>
  <!-- End point (compounding destination) -->
  <circle cx="1100" cy="110" r="9" fill="#9B2335" opacity="0.9"/>
  <circle cx="1100" cy="110" r="16" fill="none" stroke="#9B2335" stroke-width="1" opacity="0.35"/>

  <!-- ── X-AXIS STAGE TICKS ─────────────────────────────────────────────── -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.18">
    <line x1="159" y1="500" x2="159" y2="510"/>
    <line x1="295" y1="500" x2="295" y2="510"/>
    <line x1="431" y1="500" x2="431" y2="510"/>
    <line x1="567" y1="500" x2="567" y2="510"/>
    <line x1="703" y1="500" x2="703" y2="510"/>
    <line x1="839" y1="500" x2="839" y2="510"/>
  </g>

  <!-- ── METRIC LEDGER (top right — KPI rows) ───────────────────────────── -->
  <g>
    <line x1="940" y1="68" x2="1100" y2="68" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="940" y1="84" x2="1080" y2="84" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="940" y1="100" x2="1100" y2="100" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"/>
    <line x1="940" y1="116" x2="1060" y2="116" stroke="#1C1C1A" stroke-width="0.75" opacity="0.12"/>
    <line x1="940" y1="132" x2="1090" y2="132" stroke="#9B2335" stroke-width="1" opacity="0.45"/>
    <circle cx="932" cy="132" r="3" fill="#9B2335" opacity="0.6"/>
  </g>

  <!-- ── TOP-LEFT corner geometry ──────────────────────────────────────── -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <!-- ── BOTTOM dashed timeline (ARR milestones) ───────────────────────── -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.16" stroke-dasharray="4 6">
    <line x1="100" y1="558" x2="430" y2="558"/>
    <line x1="450" y1="558" x2="780" y2="558"/>
    <line x1="800" y1="558" x2="1100" y2="558"/>
  </g>
  <circle cx="100" cy="558" r="3" fill="#1C1C1A" opacity="0.4"/>
  <circle cx="430" cy="558" r="3" fill="#1C1C1A" opacity="0.4"/>
  <circle cx="780" cy="558" r="3" fill="#9B2335" opacity="0.6"/>
  <circle cx="1100" cy="558" r="3.5" fill="#9B2335" opacity="0.85"/>

  <!-- ── BOTTOM-RIGHT small target (compound destination) ──────────────── -->
  <circle cx="1130" cy="586" r="6" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.18"/>
  <circle cx="1130" cy="586" r="2" fill="#9B2335" opacity="0.5"/>

  <!-- ── Y-axis arrow head (subtle) ─────────────────────────────────────── -->
  <polyline points="95,108 100,98 105,108" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.22" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
