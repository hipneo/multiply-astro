<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F9F8F5"/>

  <!-- Faint grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1C1C1A" stroke-width="0.5" opacity="0.04"/>

  <!-- ── LEFT CLUSTER: Buying committee orbiting an account ────────────────── -->
  <!-- Outer orbit ring -->
  <circle cx="300" cy="315" r="180" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.1"
    stroke-dasharray="4 6"/>
  <!-- Mid orbit ring -->
  <circle cx="300" cy="315" r="120" fill="none" stroke="#1C1C1A" stroke-width="1" opacity="0.14"/>

  <!-- Connection lines from account hub to committee members -->
  <g stroke="#1C1C1A" stroke-width="1" opacity="0.18" fill="none">
    <line x1="300" y1="315" x2="300" y2="135"/>   <!-- top -->
    <line x1="300" y1="315" x2="456" y2="225"/>   <!-- top-right -->
    <line x1="300" y1="315" x2="456" y2="405"/>   <!-- bottom-right -->
    <line x1="300" y1="315" x2="300" y2="495"/>   <!-- bottom -->
    <line x1="300" y1="315" x2="144" y2="405"/>   <!-- bottom-left -->
    <line x1="300" y1="315" x2="144" y2="225"/>   <!-- top-left -->
  </g>

  <!-- Champion line (crimson, stronger) -->
  <line x1="300" y1="315" x2="456" y2="225" stroke="#9B2335" stroke-width="1.5" opacity="0.55"/>

  <!-- Committee member nodes -->
  <g>
    <!-- Top -->
    <circle cx="300" cy="135" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
    <!-- Top-right (champion — crimson filled) -->
    <circle cx="456" cy="225" r="11" fill="#9B2335"/>
    <circle cx="456" cy="225" r="18" fill="none" stroke="#9B2335" stroke-width="1" opacity="0.4"/>
    <!-- Bottom-right -->
    <circle cx="456" cy="405" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
    <!-- Bottom -->
    <circle cx="300" cy="495" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
    <!-- Bottom-left -->
    <circle cx="144" cy="405" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
    <!-- Top-left -->
    <circle cx="144" cy="225" r="9" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.25" opacity="0.7"/>
  </g>

  <!-- Account hub (center of cluster) -->
  <circle cx="300" cy="315" r="22" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.75" opacity="0.85"/>
  <circle cx="300" cy="315" r="6" fill="#1C1C1A" opacity="0.85"/>

  <!-- ── CONNECTING LINE (champion → pipeline) ────────────────────────────── -->
  <!-- Soft connection from champion node into pipeline stages -->
  <path d="M 467 225 C 560 225, 600 270, 700 270" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.45"/>

  <!-- Subtle parallel reinforcement line from hub -->
  <path d="M 322 315 C 480 315, 560 315, 700 315" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.16"
    stroke-dasharray="2 5"/>

  <!-- ── RIGHT SIDE: Pipeline stages ─────────────────────────────────────── -->
  <!-- Pipeline backbone -->
  <line x1="700" y1="315" x2="1100" y2="315" stroke="#1C1C1A" stroke-width="1" opacity="0.18"/>

  <!-- Stage 1: Awareness -->
  <circle cx="700" cy="315" r="10" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.5" opacity="0.65"/>
  <line x1="700" y1="285" x2="700" y2="265" stroke="#1C1C1A" stroke-width="0.75" opacity="0.2"/>

  <!-- Stage 2: Opportunity -->
  <circle cx="800" cy="315" r="10" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.5" opacity="0.7"/>
  <line x1="800" y1="285" x2="800" y2="265" stroke="#1C1C1A" stroke-width="0.75" opacity="0.2"/>

  <!-- Stage 3: Qualified — accent crimson (the moment marketing hands off) -->
  <circle cx="900" cy="315" r="14" fill="#F9F8F5" stroke="#9B2335" stroke-width="1.5" opacity="0.85"/>
  <circle cx="900" cy="315" r="6" fill="#9B2335"/>
  <!-- Bracket marks for the focal stage -->
  <polyline points="876,287 870,287 870,293" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="924,343 930,343 930,337" fill="none" stroke="#9B2335" stroke-width="1.25" opacity="0.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stage 4: Closed -->
  <circle cx="1000" cy="315" r="10" fill="#F9F8F5" stroke="#1C1C1A" stroke-width="1.5" opacity="0.7"/>

  <!-- Stage 5: Revenue -->
  <circle cx="1100" cy="315" r="10" fill="#1C1C1A" opacity="0.85"/>

  <!-- Pipeline rising chart inset (top right) -->
  <g opacity="0.4">
    <polyline points="700,180 760,168 820,156 880,140 940,120 1000,98 1060,72 1100,56"
      fill="none" stroke="#9B2335" stroke-width="1.5" opacity="0.55" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Tiny markers along the trend -->
    <circle cx="700" cy="180" r="2" fill="#9B2335" opacity="0.5"/>
    <circle cx="820" cy="156" r="2" fill="#9B2335" opacity="0.5"/>
    <circle cx="940" cy="120" r="2" fill="#9B2335" opacity="0.5"/>
    <circle cx="1100" cy="56" r="3" fill="#9B2335"/>
  </g>

  <!-- Tick marks under pipeline -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.18">
    <line x1="700" y1="345" x2="700" y2="355"/>
    <line x1="800" y1="345" x2="800" y2="355"/>
    <line x1="900" y1="345" x2="900" y2="355"/>
    <line x1="1000" y1="345" x2="1000" y2="355"/>
    <line x1="1100" y1="345" x2="1100" y2="355"/>
  </g>

  <!-- Bottom dotted band — secondary signal lines (educational content / outbound / partnerships) -->
  <g stroke="#1C1C1A" stroke-width="0.75" opacity="0.12">
    <line x1="60" y1="540" x2="420" y2="540" stroke-dasharray="3 5"/>
    <line x1="460" y1="540" x2="820" y2="540" stroke-dasharray="3 5"/>
    <line x1="860" y1="540" x2="1140" y2="540" stroke-dasharray="3 5"/>
  </g>
  <circle cx="60" cy="540" r="3" fill="#1C1C1A" opacity="0.18"/>
  <circle cx="460" cy="540" r="3" fill="#1C1C1A" opacity="0.18"/>
  <circle cx="860" cy="540" r="3" fill="#1C1C1A" opacity="0.18"/>
  <circle cx="1140" cy="540" r="3" fill="#9B2335" opacity="0.5"/>

  <!-- Top-left corner geometry -->
  <rect x="44" y="44" width="44" height="44" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.1" rx="1"/>
  <rect x="56" y="56" width="20" height="20" fill="none" stroke="#9B2335" stroke-width="0.75" opacity="0.2"/>

  <!-- Bottom-right small target -->
  <circle cx="1130" cy="586" r="6" fill="none" stroke="#1C1C1A" stroke-width="0.75" opacity="0.18"/>
  <circle cx="1130" cy="586" r="2" fill="#9B2335" opacity="0.4"/>
</svg>
