<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Glow above each pillar top -->
    <radialGradient id="glowP1" cx="15%" cy="55%" r="28%">
      <stop offset="0%" stop-color="#E8A84C" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#E8A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowP2" cx="50%" cy="25%" r="32%">
      <stop offset="0%" stop-color="#E8A84C" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#E8A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowP3" cx="85%" cy="42%" r="26%">
      <stop offset="0%" stop-color="#E8A84C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#E8A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── BASE ────────────────────────────────────────── -->
  <rect width="1200" height="630" fill="#0E0E0C"/>
  <rect width="1200" height="630" fill="url(#glowP1)"/>
  <rect width="1200" height="630" fill="url(#glowP2)"/>
  <rect width="1200" height="630" fill="url(#glowP3)"/>

  <!-- ── FAINT CHART GRID ───────────────────────────── -->
  <g stroke="#E8A84C" stroke-width="0.5" opacity="0.045">
    <line x1="0"    y1="130" x2="1200" y2="130"/>
    <line x1="0"    y1="280" x2="1200" y2="280"/>
    <line x1="0"    y1="430" x2="1200" y2="430"/>
    <line x1="0"    y1="560" x2="1200" y2="560"/>
    <line x1="200"  y1="0"   x2="200"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="1000" y1="0"   x2="1000" y2="630"/>
  </g>

  <!-- ── LARGE DECORATIVE ARCS ─────────────────────── -->
  <circle cx="600" cy="1050" r="680" fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.06"/>
  <circle cx="600" cy="1050" r="820" fill="none" stroke="#E8A84C" stroke-width="0.5"  opacity="0.04"/>
  <circle cx="-200" cy="320" r="480" fill="none" stroke="#E8A84C" stroke-width="0.5"  opacity="0.05"/>

  <!-- ── SHARED BASELINE ────────────────────────────── -->
  <line x1="100" y1="560" x2="1100" y2="560" stroke="#E8A84C" stroke-width="1" opacity="0.22"/>
  <!-- Baseline tick marks -->
  <g stroke="#E8A84C" stroke-width="1" opacity="0.3">
    <line x1="180" y1="556" x2="180" y2="564"/>
    <line x1="600" y1="556" x2="600" y2="564"/>
    <line x1="1020" y1="556" x2="1020" y2="564"/>
  </g>

  <!-- ── PILLAR 1 — Diagnostic ($3–5K, short) ──────── -->
  <!-- Height: 140px, top at y=420 -->
  <rect x="150" y="420" width="60" height="140"
        fill="#E8A84C" fill-opacity="0.04"
        stroke="#E8A84C" stroke-width="1" opacity="0.32"/>
  <!-- Inner segment line at 1/3 height -->
  <line x1="150" y1="467" x2="210" y2="467" stroke="#E8A84C" stroke-width="0.5" opacity="0.2"/>
  <!-- Top center marker -->
  <circle cx="180" cy="420" r="4" fill="#E8A84C" opacity="0.72"/>
  <!-- Diamond at top -->
  <rect x="170" y="410" width="20" height="20"
        transform="rotate(45 180 420)"
        fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.35"/>

  <!-- ── PILLAR 2 — Retainer ($5–10K, tallest) ─────── -->
  <!-- Height: 360px, top at y=200 -->
  <rect x="570" y="200" width="60" height="360"
        fill="#E8A84C" fill-opacity="0.05"
        stroke="#E8A84C" stroke-width="1.25" opacity="0.4"/>
  <!-- Two inner segment lines -->
  <line x1="570" y1="320" x2="630" y2="320" stroke="#E8A84C" stroke-width="0.5" opacity="0.2"/>
  <line x1="570" y1="440" x2="630" y2="440" stroke="#E8A84C" stroke-width="0.5" opacity="0.2"/>
  <!-- Top center node — largest, focal point -->
  <circle cx="600" cy="200" r="9"  fill="#E8A84C" opacity="0.9"/>
  <!-- Glow halo -->
  <circle cx="600" cy="200" r="32" fill="#E8A84C" opacity="0.08"/>
  <circle cx="600" cy="200" r="20" fill="#E8A84C" opacity="0.1"/>
  <!-- Target rings -->
  <circle cx="600" cy="200" r="50" fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.14"/>
  <circle cx="600" cy="200" r="84" fill="none" stroke="#E8A84C" stroke-width="0.5"  opacity="0.07"/>
  <!-- Diamond at top -->
  <rect x="586" y="186" width="28" height="28"
        transform="rotate(45 600 200)"
        fill="none" stroke="#E8A84C" stroke-width="1" opacity="0.42"/>

  <!-- ── PILLAR 3 — Advisory ($2.5–4K, medium) ──────── -->
  <!-- Height: 230px, top at y=330 -->
  <rect x="990" y="330" width="60" height="230"
        fill="#E8A84C" fill-opacity="0.04"
        stroke="#E8A84C" stroke-width="1" opacity="0.3"/>
  <!-- Inner segment line -->
  <line x1="990" y1="406" x2="1050" y2="406" stroke="#E8A84C" stroke-width="0.5" opacity="0.2"/>
  <!-- Top center marker -->
  <circle cx="1020" cy="330" r="5.5" fill="#E8A84C" opacity="0.78"/>
  <!-- Glow halo -->
  <circle cx="1020" cy="330" r="22" fill="#E8A84C" opacity="0.08"/>
  <!-- Diamond at top -->
  <rect x="1010" y="320" width="20" height="20"
        transform="rotate(45 1020 330)"
        fill="none" stroke="#E8A84C" stroke-width="0.75" opacity="0.33"/>

  <!-- ── CONNECTING LINES BETWEEN PILLAR TOPS ───────── -->
  <!-- P1 top → P2 top -->
  <line x1="180" y1="420" x2="600" y2="200"
        stroke="#E8A84C" stroke-width="1" stroke-dasharray="4 6" opacity="0.22"/>
  <!-- P2 top → P3 top -->
  <line x1="600" y1="200" x2="1020" y2="330"
        stroke="#E8A84C" stroke-width="1" stroke-dasharray="4 6" opacity="0.22"/>
  <!-- P1 top → P3 top (faint diagonal) -->
  <line x1="180" y1="420" x2="1020" y2="330"
        stroke="#E8A84C" stroke-width="0.5" opacity="0.08"/>

  <!-- ── NETWORK CONNECTIONS — TERTIARY ────────────── -->
  <g stroke="#E8A84C" stroke-width="0.75" opacity="0.1" fill="none">
    <line x1="80"   y1="490" x2="150"  y2="420"/>
    <line x1="80"   y1="490" x2="100"  y2="560"/>
    <line x1="280"  y1="390" x2="150"  y2="420"/>
    <line x1="320"  y1="480" x2="280"  y2="390"/>
    <line x1="420"  y1="350" x2="320"  y2="480"/>
    <line x1="460"  y1="500" x2="420"  y2="350"/>
    <line x1="720"  y1="480" x2="630"  y2="440"/>
    <line x1="800"  y1="320" x2="720"  y2="480"/>
    <line x1="860"  y1="460" x2="800"  y2="320"/>
    <line x1="1100" y1="240" x2="1050" y2="330"/>
    <line x1="1150" y1="420" x2="1100" y2="240"/>
    <line x1="1100" y1="500" x2="1150" y2="420"/>
    <line x1="340"  y1="280" x2="420"  y2="350"/>
    <line x1="480"  y1="200" x2="340"  y2="280"/>
    <line x1="700"  y1="140" x2="600"  y2="200"/>
    <line x1="700"  y1="140" x2="800"  y2="200"/>
    <line x1="800"  y1="200" x2="800"  y2="320"/>
  </g>

  <!-- ── NETWORK CONNECTIONS — SECONDARY ───────────── -->
  <g stroke="#E8A84C" stroke-width="0.75" opacity="0.17" fill="none">
    <line x1="80"   y1="490" x2="280"  y2="390"/>
    <line x1="280"  y1="390" x2="420"  y2="350"/>
    <line x1="420"  y1="350" x2="570"  y2="320"/>
    <line x1="630"  y1="320" x2="800"  y2="320"/>
    <line x1="800"  y1="320" x2="990"  y2="406"/>
    <line x1="480"  y1="200" x2="570"  y2="200"/>
    <line x1="1050" y1="330" x2="1100" y2="240"/>
  </g>

  <!-- ── SATELLITE NODES ────────────────────────────── -->
  <g fill="#E8A84C">
    <!-- Left cluster -->
    <circle cx="80"   cy="490" r="3.5" opacity="0.28"/>
    <circle cx="100"  cy="560" r="2.5" opacity="0.2"/>
    <circle cx="120"  cy="430" r="2.5" opacity="0.22"/>
    <circle cx="280"  cy="390" r="4"   opacity="0.3"/>
    <circle cx="260"  cy="480" r="3"   opacity="0.22"/>
    <circle cx="320"  cy="480" r="2.5" opacity="0.2"/>
    <circle cx="380"  cy="520" r="2.5" opacity="0.18"/>
    <!-- Mid-left cluster -->
    <circle cx="340"  cy="280" r="3.5" opacity="0.25"/>
    <circle cx="420"  cy="350" r="4"   opacity="0.3"/>
    <circle cx="460"  cy="500" r="3"   opacity="0.22"/>
    <circle cx="480"  cy="200" r="3.5" opacity="0.25"/>
    <circle cx="500"  cy="440" r="2.5" opacity="0.18"/>
    <circle cx="520"  cy="310" r="2.5" opacity="0.2"/>
    <!-- Around pillar 2 -->
    <circle cx="700"  cy="140" r="3"   opacity="0.22"/>
    <circle cx="720"  cy="480" r="3"   opacity="0.22"/>
    <circle cx="760"  cy="280" r="2.5" opacity="0.2"/>
    <circle cx="800"  cy="200" r="3.5" opacity="0.26"/>
    <circle cx="800"  cy="320" r="4"   opacity="0.3"/>
    <circle cx="840"  cy="380" r="2.5" opacity="0.2"/>
    <circle cx="860"  cy="460" r="3"   opacity="0.22"/>
    <!-- Right cluster -->
    <circle cx="900"  cy="280" r="3"   opacity="0.22"/>
    <circle cx="920"  cy="490" r="2.5" opacity="0.18"/>
    <circle cx="960"  cy="400" r="2.5" opacity="0.2"/>
    <circle cx="1100" cy="240" r="3.5" opacity="0.26"/>
    <circle cx="1120" cy="490" r="3"   opacity="0.2"/>
    <circle cx="1150" cy="420" r="2.5" opacity="0.18"/>
    <circle cx="1100" cy="500" r="3"   opacity="0.2"/>
    <circle cx="1160" cy="340" r="2.5" opacity="0.15"/>
    <!-- Scattered background -->
    <circle cx="140"  cy="300" r="2.5" opacity="0.15"/>
    <circle cx="220"  cy="240" r="2"   opacity="0.12"/>
    <circle cx="960"  cy="160" r="2"   opacity="0.14"/>
  </g>

  <!-- ── ACCENT: HEIGHT MEASUREMENT LINES ──────────── -->
  <!-- Left pillar height indicator -->
  <g stroke="#E8A84C" stroke-width="0.75" opacity="0.18">
    <line x1="128" y1="420" x2="128" y2="560"/>
    <line x1="124" y1="420" x2="132" y2="420"/>
    <line x1="124" y1="560" x2="132" y2="560"/>
  </g>
  <!-- Middle pillar height indicator -->
  <g stroke="#E8A84C" stroke-width="0.75" opacity="0.2">
    <line x1="548" y1="200" x2="548" y2="560"/>
    <line x1="544" y1="200" x2="552" y2="200"/>
    <line x1="544" y1="560" x2="552" y2="560"/>
  </g>
  <!-- Right pillar height indicator -->
  <g stroke="#E8A84C" stroke-width="0.75" opacity="0.16">
    <line x1="1072" y1="330" x2="1072" y2="560"/>
    <line x1="1068" y1="330" x2="1076" y2="330"/>
    <line x1="1068" y1="560" x2="1076" y2="560"/>
  </g>

  <!-- ── ACCENT: CROSS TICKS at grid intersections ─── -->
  <g stroke="#E8A84C" stroke-width="1" opacity="0.16" stroke-linecap="round">
    <line x1="196"  y1="126" x2="204" y2="134"/>
    <line x1="204"  y1="126" x2="196" y2="134"/>
    <line x1="596"  y1="276" x2="604" y2="284"/>
    <line x1="604"  y1="276" x2="596" y2="284"/>
    <line x1="996"  y1="426" x2="1004" y2="434"/>
    <line x1="1004" y1="426" x2="996"  y2="434"/>
  </g>

  <!-- ── ACCENT: BRACKET under pillar tops ──────────── -->
  <g stroke="#E8A84C" stroke-width="0.75" fill="none" opacity="0.2">
    <!-- P1 top bracket -->
    <path d="M 162 435 L 158 435 L 158 445"/>
    <path d="M 198 435 L 202 435 L 202 445"/>
    <!-- P2 top bracket -->
    <path d="M 582 215 L 578 215 L 578 225"/>
    <path d="M 618 215 L 622 215 L 622 225"/>
    <!-- P3 top bracket -->
    <path d="M 1002 345 L 998 345 L 998 355"/>
    <path d="M 1038 345 L 1042 345 L 1042 355"/>
  </g>
</svg>
